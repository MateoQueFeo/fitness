<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Log</title>
    <!-- Links to your PWA manifest for "Add to Homescreen" functionality -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="https://img.icons8.com/color/192/000000/barbell.png">
    
    <!-- Link to external CSS -->
    <link rel="stylesheet" href="styles.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-black text-gray-100 min-h-screen p-4 font-sans">
    <div class="max-w-md mx-auto">
        
        <!-- Header -->
        <header class="flex justify-between items-center mb-4 border-b border-zinc-800 pb-3">
            <h1 class="text-2xl font-bold text-yellow-500">⚡ Gym Log</h1>
            <div class="flex gap-2">
                <input type="file" id="restoreInput" accept=".json" class="hidden">
                <button id="loadButton" class="bg-zinc-900 text-xs px-3 py-1.5 rounded border border-zinc-700 hover:border-yellow-500/50 text-gray-300 transition font-bold">Load</button>
                <button id="saveButton" class="bg-yellow-500/10 text-xs px-3 py-1.5 rounded border border-yellow-500/50 hover:bg-yellow-500/20 text-yellow-500 transition font-bold">Save Backup</button>
            </div>
        </header>

        <!-- Navigation Tabs -->
        <nav class="flex gap-1 mb-6 border-b border-zinc-800 pb-2 text-sm">
            <button data-view="track" id="tab-track" class="nav-tab flex-1 font-bold pb-2 border-b-2">Track</button>
            <button data-view="history" id="tab-history" class="nav-tab flex-1 font-bold pb-2 border-b-2">History</button>
            <button data-view="progress" id="tab-progress" class="nav-tab flex-1 font-bold pb-2 border-b-2">Progress</button>
            <button data-view="routines" id="tab-routines" class="nav-tab flex-1 font-bold pb-2 border-b-2">Plans</button>
        </nav>
        
        <!-- Sticky Timer -->
        <div class="sticky top-4 z-50 bg-zinc-900/80 backdrop-blur-sm p-2.5 rounded-xl border border-zinc-800 mb-6 flex justify-between items-center gap-4 flex-wrap">
            <div id="timerDisplay" class="text-3xl font-mono font-black text-yellow-500">01:00</div>
            <div class="flex gap-2 items-center">
                <button id="addTimeBtn" class="bg-yellow-500/10 hover:bg-yellow-500/20 text-yellow-500 border border-yellow-500/30 font-bold w-12 h-10 rounded-lg text-sm transition">+1m</button>
                <button id="resetTimerBtn" class="bg-zinc-800 hover:bg-zinc-700 font-bold w-12 h-10 rounded-lg border border-zinc-700 transition text-xs">Reset</button>
                <button id="metronomeBtn" class="bg-zinc-800 border border-zinc-700 text-gray-400 w-12 h-10 rounded-lg hover:text-yellow-500 transition font-bold text-xl">🎵</button>
            </div>
        </div>

        <!-- VIEWS CONTAINER -->
        <main>
            <div id="view-track" class="view-container">
                <div class="bg-zinc-900 p-4 rounded-xl border border-zinc-800 mb-6">
                    <div class="flex justify-between items-center mb-3">
                        <h2 class="text-lg font-bold text-gray-200">Today's Workout</h2>
                        <div class="flex items-center gap-1.5">
                            <input type="checkbox" id="autoTimer" checked class="accent-yellow-500 h-3 w-3">
                            <label for="autoTimer" class="text-xs text-gray-400">Auto-Timer</label>
                        </div>
                    </div>
                    <select id="activeRoutineSelect" class="w-full bg-zinc-950 border border-zinc-700 text-yellow-500 font-semibold rounded p-2 mb-4 focus:outline-none focus:border-yellow-500 transition"></select>
                    <div id="routineChecklist" class="space-y-4 hidden"></div>
                    <div id="customSetContainer">
                        <div class="flex items-center gap-2 my-4">
                            <div class="h-px bg-zinc-800 flex-1"></div>
                            <span class="text-xs text-zinc-500 font-bold tracking-widest uppercase">Custom Set</span>
                            <div class="h-px bg-zinc-800 flex-1"></div>
                        </div>
                        <div class="space-y-3">
                            <input id="exercise" type="text" placeholder="Exercise Name" class="w-full bg-zinc-800 border border-zinc-700 rounded p-2 text-white text-sm focus:outline-none focus:border-yellow-500 transition">
                            <div class="grid grid-cols-2 gap-3">
                                <input id="weight" type="number" placeholder="Weight (lbs)" class="bg-zinc-800 border border-zinc-700 rounded p-2 text-white text-sm focus:outline-none focus:border-yellow-500 transition">
                                <input id="reps" type="number" placeholder="Reps" class="bg-zinc-800 border border-zinc-700 rounded p-2 text-white text-sm focus:outline-none focus:border-yellow-500 transition">
                            </div>
                            <button id="logCustomSetBtn" class="w-full bg-zinc-800 hover:bg-zinc-700 text-yellow-500 border border-zinc-700 font-bold p-2.5 rounded-lg transition">Log Custom Set</button>
                        </div>
                    </div>
                </div>
                <div class="bg-zinc-900 p-4 rounded-xl border border-zinc-800">
                    <h2 class="text-lg font-bold text-gray-200 mb-3">Completed Log</h2>
                    <div id="logList" class="space-y-2"></div>
                </div>
            </div>

            <div id="view-history" class="view-container hidden">
                <div class="bg-zinc-900 p-4 rounded-xl border border-zinc-800">
                    <h2 class="text-lg font-bold text-gray-200 mb-4">Past Workouts</h2>
                    <div id="historyList" class="space-y-6"></div>
                </div>
            </div>

            <div id="view-progress" class="view-container hidden">
                <div class="bg-zinc-900 p-4 rounded-xl border border-zinc-800">
                    <h2 class="text-lg font-bold text-gray-200 mb-4">Strength Progress</h2>
                    <p class="text-sm text-gray-400 mb-3">Select an exercise to view your max weight and estimated 1RM.</p>
                    <select id="exerciseSelect" class="w-full bg-zinc-800 border border-zinc-700 rounded p-2.5 text-white mb-6 focus:outline-none focus:border-yellow-500"></select>
                    <div class="w-full bg-black p-2 rounded-lg border border-zinc-800">
                        <canvas id="progressChart"></canvas>
                    </div>
                </div>
            </div>

            <div id="view-routines" class="view-container hidden">
                <div class="bg-zinc-900 p-4 rounded-xl border border-zinc-800 mb-6">
                    <h2 class="text-lg font-bold text-gray-200 mb-3">Template Builder</h2>
                    <div class="space-y-4">
                        <input id="routineName" type="text" placeholder="Template Name (e.g. Chest Day)" class="w-full bg-zinc-800 border border-zinc-700 rounded p-2.5 text-white placeholder-gray-500 focus:outline-none focus:border-yellow-500 transition">
                        <textarea id="warmupInput" placeholder="Warm-up: enter one item per line..." rows="3" class="w-full bg-zinc-800 border border-zinc-700 rounded p-2 text-white placeholder-gray-500 text-sm focus:outline-none focus:border-yellow-500 transition"></textarea>
                        <div id="exerciseRowsContainer" class="space-y-3 pt-2 border-t border-zinc-800"></div>
                        <button id="addExerciseRowBtn" class="w-full bg-zinc-800 hover:bg-zinc-700 text-yellow-500 border border-zinc-700 font-bold p-2.5 rounded-lg transition">+ Add Exercise Step</button>
                        <textarea id="cooldownInput" placeholder="Cool-down: enter one item per line..." rows="3" class="w-full bg-zinc-800 border border-zinc-700 rounded p-2 text-white placeholder-gray-500 text-sm focus:outline-none focus:border-yellow-500 transition"></textarea>
                        <button id="saveRoutineBtn" class="w-full bg-yellow-500/10 hover:bg-yellow-500/20 text-yellow-500 border border-yellow-500/50 font-bold p-3 rounded-lg transition mt-4 shadow-sm">Save Template</button>
                    </div>
                </div>
                <div class="bg-zinc-900 p-4 rounded-xl border border-zinc-800">
                    <h2 class="text-lg font-bold text-gray-200 mb-4">Saved Templates</h2>
                    <div id="routineList" class="space-y-4"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- HTML Template for Routine Builder Dynamic Rows -->
    <template id="exerciseRowTemplate">
        <div class="flex items-start gap-2 bg-zinc-950 p-2.5 rounded-lg border border-zinc-800 shadow-inner">
            <div class="flex-1 space-y-2">
                <input type="text" placeholder="Exercise (e.g. Side Lunge)" class="ex-name w-full bg-zinc-800 border border-zinc-700 rounded p-2 text-white text-sm focus:outline-none focus:border-yellow-500">
                <div class="flex gap-2">
                    <select class="ex-type w-1/3 bg-zinc-800 border border-zinc-700 rounded p-2 text-white text-xs focus:outline-none focus:border-yellow-500">
                        <option value="warm-up">warm-up</option>
                        <option value="ramp">ramp</option>
                        <option value="working" selected>working</option>
                        <option value="isolation">isolation</option>
                    </select>
                    <input type="number" placeholder="%1RM" class="ex-pct w-1/3 bg-zinc-800 border border-zinc-700 rounded p-2 text-white text-sm focus:outline-none focus:border-yellow-500">
                    <input type="text" placeholder="Reps/AMRAP" class="ex-reps w-1/3 bg-zinc-800 border border-zinc-700 rounded p-2 text-white text-sm focus:outline-none focus:border-yellow-500">
                </div>
            </div>
            <button class="remove-row-btn text-red-400 hover:text-red-500 font-bold px-2 py-2 mt-1 rounded hover:bg-red-500/10 transition">✕</button>
        </div>
    </template>
    
    <!-- Link to external JavaScript -->
    <script src="app.js"></script>
</body>
</html>
