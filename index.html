<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Workout Tracker</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LiftTracker">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2554/2554031.png">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            /* Black & Gold Theme Variables */
            --bg-color: #000000;
            --card-bg: #111111;
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: #333333;
            --input-bg: #000000;
            --input-border: #444444;
            --th-bg: #1a1a1a;
            --chart-grid: rgba(255, 255, 255, 0.08);
            
            /* The Gold Accent */
            --gold-primary: #D4AF37; 
            --gold-hover: #b5952f;
            --gold-text: #000000; /* Text inside gold buttons */
            --danger-color: #dc2626;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            max-width: 500px; 
            margin: 0 auto; 
            padding: 1rem 1rem 3rem 1rem; 
            background: var(--bg-color); 
            color: var(--text-color); 
            -webkit-tap-highlight-color: transparent; 
        }
        
        .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; margin-top: 0.5rem; }
        h1 { font-size: 1.75rem; font-weight: 800; color: var(--gold-primary); margin: 0; text-transform: uppercase; letter-spacing: 1px; }

        .card { background: var(--card-bg); padding: 1.25rem; border-radius: 12px; margin-bottom: 1rem; border: 1px solid var(--border-color); }
        h2 { margin-top: 0; font-size: 1.25rem; font-weight: 700; color: var(--text-color); }
        .form-group { margin-bottom: 1rem; display: flex; flex-direction: column; gap: 0.35rem; }
        
        input, select { background: var(--input-bg); color: var(--text-color); padding: 0.85rem; border: 1px solid var(--input-border); border-radius: 8px; font-size: 1rem; -webkit-appearance: none; transition: border-color 0.2s; }
        input:focus, select:focus { outline: none; border-color: var(--gold-primary); }
        
        button { background: var(--gold-primary); color: var(--gold-text); border: none; cursor: pointer; font-weight: bold; margin-top: 0.5rem; padding: 0.85rem; border-radius: 8px; font-size: 1rem; transition: transform 0.1s, background 0.2s; }
        button:hover { background: var(--gold-hover); }
        button:active { transform: scale(0.98); } 
        
        .btn-group { display: flex; gap: 0.5rem; }
        .btn-group button { flex: 1; }
        .cancel-btn { background: #333; color: #fff; display: none; }
        .cancel-btn:hover { background: #444; }
        
        .footer-actions { display: flex; gap: 0.5rem; margin-top: 1rem; flex-wrap: wrap; }
        .footer-actions button { flex: 1; margin-top: 0; min-width: 100px; padding: 0.75rem; font-size: 0.875rem; background: transparent; border: 1px solid var(--gold-primary); color: var(--gold-primary); }
        .footer-actions button:hover { background: rgba(212, 175, 55, 0.1); }
        .footer-actions .danger-btn { border-color: var(--danger-color); color: var(--danger-color); }
        .footer-actions .danger-btn:hover { background: rgba(220, 38, 38, 0.1); }
        
        .action-btn { padding: 0.4rem 0.6rem; font-size: 0.8rem; margin-top: 0; border-radius: 6px; cursor: pointer; display: inline-block; margin-right: 0.25rem; border: 1px solid; background: transparent; }
        .edit-btn { border-color: var(--gold-primary); color: var(--gold-primary); }
        .edit-btn:hover { background: rgba(212, 175, 55, 0.1); }
        .del-btn { border-color: var(--danger-color); color: var(--danger-color); }
        .del-btn:hover { background: rgba(220, 38, 38, 0.1); }

        /* Sticky Compact Timer Styles */
        .timer-card { 
            position: -webkit-sticky; 
            position: sticky; 
            top: 10px; 
            z-index: 100; 
            padding: 0.85rem 1.25rem; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            gap: 1rem; 
            flex-wrap: wrap; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); 
            border: 1px solid var(--gold-primary);
        }
        .timer-display { font-size: 2.25rem; font-weight: 800; margin: 0; color: var(--text-color); font-variant-numeric: tabular-nums; line-height: 1; }
        
        .timer-display.active { animation: timerPulse 2s infinite; }
        @keyframes timerPulse {
            0% { color: var(--text-color); }
            50% { color: var(--gold-primary); }
            100% { color: var(--text-color); }
        }

        .timer-controls { display: flex; gap: 0.5rem; flex: 1; min-width: 150px; justify-content: flex-end; }
        .timer-btn { flex: 1; margin-top: 0; padding: 0.7rem 0.5rem; border-radius: 8px; font-size: 0.9rem; }
        .add-min-btn { background: transparent; border: 1px solid var(--gold-primary); color: var(--gold-primary); }
        .add-min-btn:hover { background: rgba(212, 175, 55, 0.1); }
        .stop-btn { background: #333; color: #fff; }
        
        .pr-gold { color: var(--gold-primary); font-weight: bold; }
        .session-group { margin-top: 1rem; border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; background: var(--card-bg); }
        .session-header { background: var(--th-bg); padding: 0.75rem 1rem; margin: 0; font-size: 1rem; font-weight: 700; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 0.5rem; color: var(--gold-primary); }
        
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th, td { text-align: left; padding: 0.85rem 0.75rem; border-bottom: 1px solid var(--border-color); }
        tr:last-child td { border-bottom: none; }
        th { background: var(--th-bg); color: var(--text-muted); font-weight: 600; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.5px; }
        canvas { max-width: 100%; margin-top: 1rem; }
        
        ::placeholder { color: #6b7280; opacity: 0.8; }
    </style>
</head>
<body>
    
    <div class="header-container">
        <h1>LiftTracker</h1>
    </div>
    
    <!-- Sticky Compact Timer Card -->
    <div class="card timer-card">
        <div class="timer-display" id="timerDisplay">01:00</div>
        <div class="timer-controls">
            <button class="timer-btn add-min-btn" onclick="addMinute()">+1 Min</button>
            <button class="timer-btn stop-btn" onclick="stopTimer()">Reset</button>
        </div>
    </div>

    <div class="card">
        <h2 id="formTitle">Log a Set</h2>
        <div class="form-group">
            <label for="exercise">Exercise</label>
            <input type="text" id="exercise" list="exerciseOptions" placeholder="Start typing..." autocomplete="off" required>
            <datalist id="exerciseOptions"></datalist>
        </div>
        <div class="form-group">
            <label for="weight">Weight</label>
            <input type="number" id="weight" placeholder="Weight" required>
        </div>
        <div class="form-group">
            <label for="reps">Reps</label>
            <input type="number" id="reps" placeholder="Reps" required>
        </div>
        <div class="btn-group">
            <button id="submitBtn" onclick="processSet()">Log Set</button>
            <button id="cancelEditBtn" class="cancel-btn" onclick="cancelEdit()">Cancel</button>
        </div>
    </div>

    <div class="card">
        <h2>🏆 Personal Bests (PRs)</h2>
        <div id="prContainer"></div>
    </div>

    <div class="card">
        <h2>📈 Progress Chart (1RM)</h2>
        <div class="form-group">
            <label for="chartExerciseSelect">Select Exercise to Chart</label>
            <select id="chartExerciseSelect" onchange="updateChart()">
                <option value="">-- Select an Exercise --</option>
            </select>
        </div>
        <canvas id="progressChart"></canvas>
    </div>

    <div class="card">
        <h2>History</h2>
        <div id="historyContainer"></div>
        
        <input type="file" id="csvFileInput" accept=".csv" style="display: none;" onchange="importFromCSV(event)">
        
        <div class="footer-actions">
            <button onclick="document.getElementById('csvFileInput').click()">📂 Import</button>
            <button onclick="exportToCSV()">💾 Export</button>
            <button class="danger-btn" onclick="clearAllData()">🗑️ Clear</button>
        </div>
    </div>

    <script>
        const defaultExercises = [
            "Bench Press", "Squat", "Deadlift", "Overhead Press", 
            "Barbell Row", "Pull Up", "Dumbbell Curl", "Leg Press", 
            "Romanian Deadlift", "Front Squat", "Lat Pulldown", "Tricep Extension"
        ];

        // --- TIMER LOGIC ---
        let timerInterval;
        let timeRemaining = 60;
        let isTimerRunning = false;

        function startTimer() {
            // ***FIXED***: If a timer is already running, do not force-reset it.
            if (isTimerRunning) {
                return; 
            }

            timeRemaining = 60;
            isTimerRunning = true;
            
            const displayEl = document.getElementById('timerDisplay');
            displayEl.classList.add('active');
            updateTimerUI(timeRemaining);

            timerInterval = setInterval(() => {
                timeRemaining--;
                updateTimerUI(timeRemaining);

                if (timeRemaining <= 0) {
                    clearInterval(timerInterval);
                    isTimerRunning = false;
                    displayEl.classList.remove('active');
                    playBeep();
                    
                    timeRemaining = 60;
                    updateTimerUI(timeRemaining);
                }
            }, 1000);
        }

        function addMinute() {
            timeRemaining += 60;
            updateTimerUI(timeRemaining);
        }

        function stopTimer() {
            clearInterval(timerInterval);
            isTimerRunning = false;
            document.getElementById('timerDisplay').classList.remove('active');
            timeRemaining = 60; 
            updateTimerUI(timeRemaining);
        }

        function updateTimerUI(seconds) {
            const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
            const secs = (seconds % 60).toString().padStart(2, '0');
            const timeString = `${mins}:${secs}`;
            
            document.getElementById('timerDisplay').innerText = timeString;
            
            if (isTimerRunning && seconds > 0) {
                document.title = `(${timeString}) Resting...`;
            } else {
                document.title = `LiftTracker`;
            }
        }

        function playBeep() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, ctx.currentTime);
                osc.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.5);
            } catch (e) { console.log("Audio API not supported."); }
            setTimeout(() => alert("Rest time is up!"), 100);
        }

        // --- TRACKER LOGIC ---
        let workouts = [];
        let chartInstance = null;
        let editingIndex = null; 

        window.onload = function() {
            const savedData = localStorage.getItem('workoutData');
            if (savedData) {
                workouts = JSON.parse(savedData);
            }
            renderHistory();
            renderPRs();
            updateExerciseDropdowns();
            
            // Draw chart initially if empty data
            updateChart();
        };

        function calculate1RM(weight, reps) {
            if (reps === 1) return weight;
            return Math.round(weight * (1 + reps / 30));
        }

        function processSet() {
            const exerciseInput = document.getElementById('exercise').value.trim();
            const exercise = exerciseInput.replace(/\b\w/g, l => l.toUpperCase());
            const weight = parseFloat(document.getElementById('weight').value);
            const reps = parseInt(document.getElementById('reps').value);

            if (!exercise || isNaN(weight) || isNaN(reps)) {
                alert("Please fill out all fields with valid numbers.");
                return;
            }

            const estimated1RM = calculate1RM(weight, reps);

            if (editingIndex !== null) {
                workouts[editingIndex].exercise = exercise;
                workouts[editingIndex].weight = weight;
                workouts[editingIndex].reps = reps;
                workouts[editingIndex].estimated1RM = estimated1RM;
                
                editingIndex = null;
                document.getElementById('formTitle').innerText = 'Log a Set';
                document.getElementById('submitBtn').innerText = 'Log Set';
                document.getElementById('cancelEditBtn').style.display = 'none';
            } else {
                // ***FIXED***: Use ISO 8601 format (YYYY-MM-DD) for reliable sorting
                const date = new Date().toISOString().slice(0, 10);
                workouts.unshift({ date, exercise, weight, reps, estimated1RM });
            }

            saveAndRender();
            startTimer();

            document.getElementById('weight').value = '';
            document.getElementById('reps').value = '';
            document.getElementById('exercise').value = '';
            document.getElementById('exercise').focus();
        }

        function saveAndRender() {
            // Sort workouts by date before saving to ensure consistency
            workouts.sort((a, b) => new Date(b.date) - new Date(a.date));
            localStorage.setItem('workoutData', JSON.stringify(workouts));
            
            renderHistory();
            renderPRs();
            updateExerciseDropdowns();
            updateChart();
        }

        function editSet(index) {
            editingIndex = index;
            const workout = workouts[index];
            
            document.getElementById('exercise').value = workout.exercise;
            document.getElementById('weight').value = workout.weight;
            document.getElementById('reps').value = workout.reps;
            
            document.getElementById('formTitle').innerText = `Edit Set (${formatDateForDisplay(workout.date)})`;
            document.getElementById('submitBtn').innerText = 'Update Set';
            document.getElementById('cancelEditBtn').style.display = 'block';
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cancelEdit() {
            editingIndex = null;
            document.getElementById('weight').value = '';
            document.getElementById('reps').value = '';
            document.getElementById('exercise').value = '';
            
            document.getElementById('formTitle').innerText = 'Log a Set';
            document.getElementById('submitBtn').innerText = 'Log Set';
            document.getElementById('cancelEditBtn').style.display = 'none';
        }

        function deleteSet(index) {
            if (confirm("Are you sure you want to delete this set?")) {
                workouts.splice(index, 1);
                if (editingIndex === index) cancelEdit();
                saveAndRender();
            }
        }
        
        function formatDateForDisplay(dateString) {
            // Converts 'YYYY-MM-DD' to 'MM/DD/YYYY' for display
            const [year, month, day] = dateString.split('-');
            return `${month}/${day}/${year}`;
        }

        function renderHistory() {
            const container = document.getElementById('historyContainer');
            container.innerHTML = ''; 

            if (workouts.length === 0) {
                container.innerHTML = '<p style="color: var(--text-muted);">No workouts logged yet.</p>';
                return;
            }

            const grouped = {};
            const dateOrder = [];

            workouts.forEach((workout, index) => {
                if (!grouped[workout.date]) {
                    grouped[workout.date] = [];
                    // Use a stable sort order by not re-adding dates
                    if (!dateOrder.includes(workout.date)) {
                        dateOrder.push(workout.date);
                    }
                }
                grouped[workout.date].push({ ...workout, originalIndex: index });
            });
            
            // dateOrder is already sorted from saveAndRender, so no need to re-sort here

            dateOrder.forEach(date => {
                const sessionDiv = document.createElement('div');
                sessionDiv.className = 'session-group';

                const header = document.createElement('h3');
                header.className = 'session-header';
                // ***FIXED***: Format date for display
                header.innerHTML = `📅 ${formatDateForDisplay(date)}`;

                const table = document.createElement('table');
                table.innerHTML = `
                    <thead>
                        <tr>
                            <th>Exercise</th>
                            <th>W × R</th>
                            <th>1RM</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${grouped[date].map(item => `
                            <tr>
                                <td>${item.exercise}</td>
                                <td>${item.weight} × ${item.reps}</td>
                                <td><strong style="color: var(--text-color);">${item.estimated1RM}</strong></td>
                                <td style="white-space: nowrap;">
                                    <button class="action-btn edit-btn" onclick="editSet(${item.originalIndex})">Edit</button>
                                    <button class="action-btn del-btn" onclick="deleteSet(${item.originalIndex})">Del</button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                `;

                sessionDiv.appendChild(header);
                sessionDiv.appendChild(table);
                container.appendChild(sessionDiv);
            });
        }

        function renderPRs() {
            const container = document.getElementById('prContainer');
            container.innerHTML = '';

            if (workouts.length === 0) {
                container.innerHTML = '<p style="color: var(--text-muted); margin: 0;">Log a workout to establish your personal records.</p>';
                return;
            }

            const prs = {};
            workouts.forEach(w => {
                if (!prs[w.exercise] || w.estimated1RM > prs[w.exercise].estimated1RM) {
                    prs[w.exercise] = w;
                }
            });

            const sortedPRExercises = Object.keys(prs).sort();

            const table = document.createElement('table');
            table.innerHTML = `
                <thead>
                    <tr>
                        <th>Exercise</th>
                        <th>Best Set</th>
                        <th>Best 1RM</th>
                    </tr>
                </thead>
                <tbody>
                    ${sortedPRExercises.map(exName => {
                        const pr = prs[exName];
                        return `
                            <tr>
                                <td><strong>${pr.exercise}</strong></td>
                                <td>${pr.weight} × ${pr.reps}</td>
                                <td class="pr-gold">★ ${pr.estimated1RM}</td>
                            </tr>
                        `;
                    }).join('')}
                </tbody>
            `;
            container.appendChild(table);
        }

        function updateExerciseDropdowns() {
            const historyExercises = workouts.map(w => w.exercise);
            const combinedExercises = [...new Set([...defaultExercises, ...historyExercises])].sort();

            const datalist = document.getElementById('exerciseOptions');
            datalist.innerHTML = '';
            combinedExercises.forEach(ex => {
                const option = document.createElement('option');
                option.value = ex;
                datalist.appendChild(option);
            });

            const chartSelect = document.getElementById('chartExerciseSelect');
            const currentChartValue = chartSelect.value;
            
            const uniqueLoggedExercises = [...new Set(workouts.map(w => w.exercise))].sort();
            
            chartSelect.innerHTML = '<option value="">-- Select an Exercise --</option>';
            uniqueLoggedExercises.forEach(ex => {
                const option = document.createElement('option');
                option.value = ex;
                option.textContent = ex;
                chartSelect.appendChild(option);
            });

            if (uniqueLoggedExercises.includes(currentChartValue)) {
                chartSelect.value = currentChartValue;
            } else if (uniqueLoggedExercises.length > 0 && !currentChartValue) {
                 chartSelect.value = uniqueLoggedExercises[0];
                 updateChart();
            }
        }

        function updateChart() {
            const selectedExercise = document.getElementById('chartExerciseSelect').value;
            if (!selectedExercise) {
                if (chartInstance) chartInstance.destroy();
                return;
            }

            const filteredWorkouts = workouts.filter(w => w.exercise === selectedExercise);

            const dailyMax = {};
            filteredWorkouts.forEach(w => {
                if (!dailyMax[w.date] || w.estimated1RM > dailyMax[w.date]) {
                    dailyMax[w.date] = w.estimated1RM;
                }
            });

            // ***FIXED***: With YYYY-MM-DD format, a simple string sort is chronologically correct.
            const sortedDates = Object.keys(dailyMax).sort();
            const chartData = sortedDates.map(date => dailyMax[date]);

            renderChartCanvas(sortedDates, chartData, selectedExercise);
        }

        function renderChartCanvas(labels, data, exerciseName) {
            const ctx = document.getElementById('progressChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();

            // Pull colors from CSS variables
            const rootStyle = getComputedStyle(document.documentElement);
            const goldColor = rootStyle.getPropertyValue('--gold-primary').trim();
            const gridColor = rootStyle.getPropertyValue('--chart-grid').trim();
            const textColor = rootStyle.getPropertyValue('--text-muted').trim();
            
            // ***FIXED***: Format YYYY-MM-DD to MM/DD for chart labels
            const formattedLabels = labels.map(dateStr => {
                const [, month, day] = dateStr.split('-');
                return `${month}/${day}`;
            });

            Chart.defaults.color = textColor;

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: formattedLabels,
                    datasets: [{
                        label: `Est. 1RM for ${exerciseName}`,
                        data: data,
                        borderColor: goldColor,
                        backgroundColor: 'rgba(212, 175, 55, 0.15)', // Light gold transparency
                        borderWidth: 2,
                        pointBackgroundColor: goldColor,
                        fill: true,
                        tension: 0.1
                    }]
                },
                options: { 
                    responsive: true, 
                    scales: { 
                        y: { 
                            beginAtZero: false, 
                            title: { display: true, text: 'Weight' },
                            grid: { color: gridColor }
                        },
                        x: {
                            grid: { color: gridColor }
                        }
                    } 
                }
            });
        }

        // --- IMPORT/EXPORT LOGIC ---
        function exportToCSV() {
            if (workouts.length === 0) {
                alert("There is no data to export.");
                return;
            }
            let csvContent = "data:text/csv;charset=utf-8,Date,Exercise,Weight,Reps,Estimated 1RM\n";
            // Sort chronologically for export
            const sortedForExport = [...workouts].sort((a,b) => new Date(a.date) - new Date(b.date));
            sortedForExport.forEach(w => {
                const safeDate = `"${w.date}"`;
                const safeExercise = `"${w.exercise.replace(/"/g, '""')}"`;
                csvContent += `${safeDate},${safeExercise},${w.weight},${w.reps},${w.estimated1RM}\n`;
            });
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `workout_history_${new Date().toISOString().slice(0,10)}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // ***FIXED***: Robust RFC 4180-compliant CSV line parser to handle commas inside quotes securely
        function parseCSVLine(text) {
            const result = [];
            let insideQuote = false;
            let entry = '';
            
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const nextChar = text[i + 1];
                
                if (char === '"') {
                    if (insideQuote && nextChar === '"') {
                        // Handle escaped quotes (e.g., "" becomes ")
                        entry += '"';
                        i++; // Skip next quote
                    } else {
                        // Toggle quote state
                        insideQuote = !insideQuote;
                    }
                } else if (char === ',' && !insideQuote) {
                    result.push(entry.trim());
                    entry = '';
                } else {
                    entry += char;
                }
            }
            result.push(entry.trim());
            return result;
        }

        function importFromCSV(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const lines = e.target.result.split(/\r?\n/).filter(line => line.trim() !== '');
                if (lines.length <= 1) {
                    alert("The CSV file appears to be empty or invalid.");
                    return;
                }
                
                let importedWorkouts = [];
                for (let i = 1; i < lines.length; i++) {
                    // Call our secure parser instead of split/regex
                    const row = parseCSVLine(lines[i]);
                    
                    if (row.length >= 4) {
                        let date = row[0];
                        // Convert MM/DD/YYYY to YYYY-MM-DD if needed
                        if (date.includes('/')) {
                            const parts = date.split('/');
                            date = `${parts[2]}-${parts[0].padStart(2, '0')}-${parts[1].padStart(2, '0')}`;
                        }
                        
                        // Sanitize inputs and enforce safe types
                        const exercise = row[1].replace(/[<>]/g, ""); // Prevent basic XSS payloads
                        const weight = parseFloat(row[2]);
                        const reps = parseInt(row[3]);
                        
                        if (date && exercise && !isNaN(weight) && !isNaN(reps)) {
                            const estimated1RM = parseInt(row[4]) || calculate1RM(weight, reps);
                            importedWorkouts.push({ date, exercise, weight, reps, estimated1RM });
                        }
                    }
                }
                if (importedWorkouts.length > 0) {
                    workouts = [...workouts, ...importedWorkouts];
                    saveAndRender();
                    alert(`Successfully imported ${importedWorkouts.length} sets!`);
                } else {
                    alert("Could not find valid workout data in this CSV.");
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        function clearAllData() {
            if (confirm("Are you sure you want to delete ALL your workout data? This cannot be undone.")) {
                workouts = [];
                saveAndRender();
                if (chartInstance) chartInstance.destroy();
            }
        }
    </script>
</body>
</html>
