<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Log</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="https://img.icons8.com/color/192/000000/barbell.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js for graphing progress -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-black text-gray-100 min-h-screen p-4 font-sans">
    <div class="max-w-md mx-auto">
        
        <!-- Header -->
        <header class="flex justify-between items-center mb-4">
            <h1 class="text-2xl font-bold text-yellow-500">⚡ Gym Log</h1>
            <button onclick="exportData()" class="bg-zinc-900 text-xs px-3 py-1.5 rounded border border-zinc-800 hover:bg-zinc-800 hover:border-yellow-500/50 text-yellow-500 transition font-semibold">Export CSV</button>
        </header>

        <!-- Navigation Tabs -->
        <div class="flex gap-2 mb-6 border-b border-zinc-800 pb-2">
            <button onclick="switchView('track')" id="tab-track" class="flex-1 font-bold pb-2 border-b-2 border-yellow-500 text-yellow-500 transition">Track</button>
            <button onclick="switchView('history')" id="tab-history" class="flex-1 font-bold pb-2 border-b-2 border-transparent text-gray-500 hover:text-gray-300 transition">History</button>
            <button onclick="switchView('progress')" id="tab-progress" class="flex-1 font-bold pb-2 border-b-2 border-transparent text-gray-500 hover:text-gray-300 transition">Progress</button>
        </div>

        <!-- ============================== -->
        <!-- VIEW 1: TRACKING SCREEN        -->
        <!-- ============================== -->
        <div id="view-track" class="block">
            
            <!-- ⏱️ Automated Minimalist Rest Timer Widget -->
            <div class="bg-zinc-900 p-4 rounded-xl border border-zinc-800 mb-6">
                <div class="flex items-center gap-4 w-full">
                    <!-- Giant Countdown Timer -->
                    <div id="timerDisplay" class="text-4xl font-mono font-black text-yellow-500 bg-black px-4 py-2 rounded-lg border border-zinc-800 flex-1 text-center">
                        01:00
                    </div>
                    <!-- Simplified Controls -->
                    <div class="flex gap-2">
                        <button onclick="addTime(60)" class="bg-yellow-500/10 hover:bg-yellow-500/20 text-yellow-500 border border-yellow-500/30 font-bold px-4 py-3 rounded-lg transition">+1m</button>
                        <button onclick="resetTimer()" class="bg-zinc-800 hover:bg-zinc-700 font-bold px-4 py-3 rounded-lg border border-zinc-700 transition">Reset</button>
                    </div>
                </div>
            </div>

            <!-- Log Workout Form -->
            <div class="bg-zinc-900 p-4 rounded-xl border border-zinc-800 mb-6">
                <h2 class="text-lg font-bold text-gray-200 mb-3">Add Set</h2>
                <div class="space-y-3">
                    <input id="exercise" type="text" placeholder="Exercise (e.g. Bench Press)" class="w-full bg-zinc-800 border border-zinc-700 rounded p-2.5 text-white placeholder-gray-500 focus:outline-none focus:border-yellow-500 transition">
                    <div class="grid grid-cols-2 gap-3">
                        <input id="weight" type="number" placeholder="Weight (lbs)" class="bg-zinc-800 border border-zinc-700 rounded p-2.5 text-white placeholder-gray-500 focus:outline-none focus:border-yellow-500 transition">
                        <input id="reps" type="number" placeholder="Reps" class="bg-zinc-800 border border-zinc-700 rounded p-2.5 text-white placeholder-gray-500 focus:outline-none focus:border-yellow-500 transition">
                    </div>
                    <div class="flex items-center gap-2 text-sm text-gray-400 mt-1">
                        <input type="checkbox" id="autoTimer" checked class="accent-yellow-500 h-4 w-4">
                        <label for="autoTimer">Auto-start rest timer on logging set</label>
                    </div>
                    <button onclick="saveSet()" class="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-bold p-3 rounded-lg transition shadow-md shadow-yellow-500/10">Log Set</button>
                </div>
            </div>

            <!-- Today's Display -->
            <div class="bg-zinc-900 p-4 rounded-xl border border-zinc-800">
                <h2 class="text-lg font-bold text-gray-200 mb-3">Today's Workout</h2>
                <div id="logList" class="space-y-2">
                    <!-- Today's logged items dynamically render here -->
                </div>
            </div>
        </div>

        <!-- ============================== -->
        <!-- VIEW 2: HISTORY ARCHIVE        -->
        <!-- ============================== -->
        <div id="view-history" class="hidden">
            <div class="bg-zinc-900 p-4 rounded-xl border border-zinc-800">
                <h2 class="text-lg font-bold text-gray-200 mb-4">Past Workouts</h2>
                <div id="historyList" class="space-y-6">
                    <!-- History gets rendered here -->
                </div>
            </div>
        </div>

        <!-- ============================== -->
        <!-- VIEW 3: PROGRESS GRAPHS        -->
        <!-- ============================== -->
        <div id="view-progress" class="hidden">
            <div class="bg-zinc-900 p-4 rounded-xl border border-zinc-800">
                <h2 class="text-lg font-bold text-gray-200 mb-4">Strength Progress</h2>
                <p class="text-sm text-gray-400 mb-3">Select an exercise to view your max weight and estimated 1RM.</p>
                
                <select id="exerciseSelect" onchange="updateChart()" class="w-full bg-zinc-800 border border-zinc-700 rounded p-2.5 text-white mb-6 focus:outline-none focus:border-yellow-500">
                    <option value="">Select Exercise...</option>
                </select>

                <div class="w-full bg-black p-2 rounded-lg border border-zinc-800">
                    <canvas id="progressChart"></canvas>
                </div>
            </div>
        </div>

    </div>

    <script>
        let workoutLogs = JSON.parse(localStorage.getItem('workoutLogs')) || [];
        
        // -----------------------
        // VIEW NAVIGATION
        // -----------------------
        const views = ['track', 'history', 'progress'];
        
        function switchView(targetView) {
            views.forEach(view => {
                const el = document.getElementById(`view-${view}`);
                const tab = document.getElementById(`tab-${view}`);
                
                if (view === targetView) {
                    el.classList.replace('hidden', 'block');
                    tab.classList.replace('border-transparent', 'border-yellow-500');
                    tab.classList.replace('text-gray-500', 'text-yellow-500');
                } else {
                    if (el.classList.contains('block')) el.classList.replace('block', 'hidden');
                    tab.classList.replace('border-yellow-500', 'border-transparent');
                    tab.classList.replace('text-yellow-500', 'text-gray-500');
                }
            });

            if (targetView === 'history') renderHistory();
            if (targetView === 'track') renderLogs();
            if (targetView === 'progress') {
                populateExerciseDropdown();
                updateChart();
            }
        }

        // -----------------------
        // AUTO Rest Timer Logic
        // -----------------------
        let timerInstance = null;
        let defaultSeconds = 60; // 1 Minute Default
        let currentSecondsRemaining = defaultSeconds;

        function updateTimerDisplay() {
            const minutes = Math.floor(currentSecondsRemaining / 60);
            const seconds = currentSecondsRemaining % 60;
            document.getElementById('timerDisplay').innerText = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function startTimer() {
            // Clear any active timer instances first
            clearInterval(timerInstance);
            
            timerInstance = setInterval(() => {
                if (currentSecondsRemaining > 0) {
                    currentSecondsRemaining--;
                    updateTimerDisplay();
                } else {
                    clearInterval(timerInstance);
                    timerInstance = null;
                    alertUser(); 
                    currentSecondsRemaining = defaultSeconds;
                    updateTimerDisplay();
                }
            }, 1000);
        }

        function addTime(seconds) {
            currentSecondsRemaining += seconds;
            updateTimerDisplay();
            // If the timer wasn't running, start it
            if (!timerInstance) {
                startTimer();
            }
        }

        function resetTimer() {
            clearInterval(timerInstance);
            timerInstance = null;
            currentSecondsRemaining = defaultSeconds;
            updateTimerDisplay();
        }

        function alertUser() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); 
                gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime); 
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                setTimeout(() => { oscillator.stop(); }, 800);
            } catch (e) {
                console.log("Audio play blocked: ", e);
            }
        }

        // -----------------------
        // LOGGING & DISPLAY LOGIC
        // -----------------------
        function saveSet() {
            const exercise = document.getElementById('exercise').value.trim();
            const weight = document.getElementById('weight').value;
            const reps = document.getElementById('reps').value;

            if (!exercise || !weight || !reps) return alert('Please fill in all fields!');

            const log = {
                id: Date.now(),
                date: new Date().toLocaleDateString(),
                exercise,
                weight,
                reps
            };

            workoutLogs.unshift(log); 
            localStorage.setItem('workoutLogs', JSON.stringify(workoutLogs));
            renderLogs();
            
            document.getElementById('weight').value = '';
            document.getElementById('reps').value = '';

            // Auto-start action trigger
            if (document.getElementById('autoTimer').checked) {
                resetTimer();
                startTimer();
            }
        }

        function deleteLog(id) {
            if (confirm("Are you sure you want to delete this logged set?")) {
                workoutLogs = workoutLogs.filter(log => log.id !== id);
                localStorage.setItem('workoutLogs', JSON.stringify(workoutLogs));
                renderLogs();
                renderHistory();
                if(document.getElementById('view-progress').classList.contains('block')) {
                    populateExerciseDropdown();
                    updateChart();
                }
            }
        }

        function renderLogs() {
            const todayDate = new Date().toLocaleDateString();
            const todaysLogs = workoutLogs.filter(log => log.date === todayDate);
            const list = document.getElementById('logList');
            list.innerHTML = todaysLogs.length ? '' : '<p class="text-zinc-500 text-sm text-center py-2">No sets logged yet today.</p>';
            
            todaysLogs.forEach(log => {
                const item = document.createElement('div');
                item.className = "flex justify-between items-center bg-zinc-800 p-3 rounded-lg border border-zinc-700/60";
                item.innerHTML = `
                    <div class="font-semibold text-white">${log.exercise}</div>
                    <div class="flex items-center gap-4">
                        <span class="text-yellow-500 font-bold">${log.weight} lbs × ${log.reps}</span>
                        <button onclick="deleteLog(${log.id})" class="text-red-400 hover:text-red-500 font-bold px-2 py-1 text-sm transition" title="Delete set">✕</button>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        function renderHistory() {
            const todayDate = new Date().toLocaleDateString();
            const pastLogs = workoutLogs.filter(log => log.date !== todayDate);
            const list = document.getElementById('historyList');

            if (pastLogs.length === 0) {
                list.innerHTML = '<p class="text-zinc-500 text-sm text-center py-4">No past history found.</p>';
                return;
            }

            const groupedLogs = pastLogs.reduce((groups, log) => {
                if (!groups[log.date]) groups[log.date] = [];
                groups[log.date].push(log);
                return groups;
            }, {});

            list.innerHTML = ''; 
            for (const [date, logs] of Object.entries(groupedLogs)) {
                const dateGroup = document.createElement('div');
                let setsHTML = logs.map(log => `
                    <div class="flex justify-between items-center bg-zinc-800 p-2.5 rounded-lg border border-zinc-700/50 text-sm mt-1.5">
                        <span class="text-gray-300 font-medium">${log.exercise}</span>
                        <div class="flex items-center gap-3">
                            <span class="text-yellow-500 font-semibold">${log.weight} lbs × ${log.reps}</span>
                            <button onclick="deleteLog(${log.id})" class="text-red-400 hover:text-red-500 font-bold px-1.5 text-xs transition">✕</button>
                        </div>
                    </div>
                `).join('');

                dateGroup.innerHTML = `
                    <div class="mb-4 border-l-2 border-yellow-500 pl-3">
                        <h3 class="text-gray-400 font-bold text-sm mb-2">${date}</h3>
                        <div class="space-y-1">${setsHTML}</div>
                    </div>
                `;
                list.appendChild(dateGroup);
            }
        }

        // -----------------------
        // CHART & PROGRESS LOGIC
        // -----------------------
        let progressChart = null;

        function populateExerciseDropdown() {
            const select = document.getElementById('exerciseSelect');
            const currentSelection = select.value;
            const uniqueExercises = [...new Set(workoutLogs.map(log => log.exercise.toLowerCase().trim()))].sort();
            
            select.innerHTML = '<option value="">Select Exercise...</option>';
            uniqueExercises.forEach(ex => {
                const opt = document.createElement('option');
                opt.value = ex;
                opt.textContent = ex.charAt(0).toUpperCase() + ex.slice(1);
                select.appendChild(opt);
            });
            if(uniqueExercises.includes(currentSelection)) select.value = currentSelection;
        }

        function updateChart() {
            const selectedExercise = document.getElementById('exerciseSelect').value;
            const ctx = document.getElementById('progressChart').getContext('2d');

            if (!selectedExercise) {
                if (progressChart) progressChart.destroy();
                return;
            }

            const filteredLogs = workoutLogs.filter(log => log.exercise.toLowerCase().trim() === selectedExercise);

            const maxWeightPerDate = {};
            const max1RmPerDate = {};

            filteredLogs.forEach(log => {
                const weight = parseFloat(log.weight);
                const reps = parseInt(log.reps);
                const estimated1RM = Math.round(weight * (1 + (reps / 30)));

                if (!maxWeightPerDate[log.date] || weight > maxWeightPerDate[log.date]) {
                    maxWeightPerDate[log.date] = weight;
                }
                if (!max1RmPerDate[log.date] || estimated1RM > max1RmPerDate[log.date]) {
                    max1RmPerDate[log.date] = estimated1RM;
                }
            });

            const sortedDates = Object.keys(maxWeightPerDate).sort((a, b) => new Date(a) - new Date(b));
            const weightData = sortedDates.map(date => maxWeightPerDate[date]);
            const oneRmData = sortedDates.map(date => max1RmPerDate[date]);

            if (progressChart) progressChart.destroy();

            Chart.defaults.color = '#9ca3af'; 
            Chart.defaults.font.family = 'ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif';

            progressChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: sortedDates,
                    datasets: [
                        {
                            label: 'Max Weight (lbs)',
                            data: weightData,
                            borderColor: '#eab308', 
                            backgroundColor: 'rgba(234, 179, 8, 0.15)',
                            borderWidth: 3,
                            pointBackgroundColor: '#eab308',
                            pointBorderColor: '#000',
                            pointBorderWidth: 2,
                            pointRadius: 5,
                            fill: true,
                            tension: 0.3
                        },
                        {
                            label: 'Estimated 1RM (lbs)',
                            data: oneRmData,
                            borderColor: '#e5e7eb', 
                            backgroundColor: 'transparent',
                            borderWidth: 2,
                            borderDash: [5, 5], 
                            pointBackgroundColor: '#e5e7eb',
                            pointBorderColor: '#000',
                            pointBorderWidth: 2,
                            pointRadius: 4,
                            fill: false,
                            tension: 0.3
                        }
                    ]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: { 
                            beginAtZero: false,
                            grid: { color: 'rgba(63, 63, 70, 0.5)' } 
                        },
                        x: { 
                            grid: { display: false } 
                        }
                    },
                    plugins: {
                        legend: { 
                            display: true,
                            labels: { color: '#d1d5db', usePointStyle: true }
                        } 
                    }
                }
            });
        }

        function exportData() {
            let csvContent = "data:text/csv;charset=utf-8,Date,Exercise,Weight,Reps\n";
            workoutLogs.forEach(log => {
                csvContent += `${log.date},"${log.exercise}",${log.weight},${log.reps}\n`;
            });
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "workout_history.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Initialize displays
        updateTimerDisplay();
        renderLogs();
    </script>
</body>
</html>
