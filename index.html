<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Tracker</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="timer-container">
        <span id="timer-display">01:00</span>
        <button id="start-timer-btn">Start Rest</button>
        <button id="add-minute-btn" style="display: none;">+1 Min</button>
        <button id="reset-timer-btn" style="display: none; background-color: #555; color: #fff;">Reset</button>
    </div>

    <div id="toast-notification"></div>

    <div id="exercise-details-modal" class="modal">
        <div class="modal-content">
            <span class="modal-close-button" onclick="closeExerciseDetailsModal()">&times;</span>
            <h2 id="details-title"></h2>
            <div id="details-content"></div>
        </div>
    </div>

    <div id="progress-summary-modal" class="modal">
        <div class="modal-content">
            <span class="modal-close-button" onclick="closeProgressSummaryModal()">&times;</span>
            <h2 id="summary-title"></h2>
            <div id="summary-content"></div>
        </div>
    </div>

    <div id="edit-log-container" class="card" style="display: none;">
        <h2>Edit Set</h2>
        <label for="edit-exercise">Exercise:</label>
        <input type="text" id="edit-exercise" disabled style="background-color: #333;">
        
        <label for="edit-weight">Weight (lbs):</label>
        <input type="number" id="edit-weight" step="0.5">
        
        <label for="edit-reps">Reps:</label>
        <input type="number" id="edit-reps">
        
        <input type="hidden" id="edit-key">
        <button onclick="updateLog()">Update Set</button>
        <button id="cancel-button" onclick="cancelEdit()">Cancel</button>
    </div>

    <div class="card">
        <h2>Select Routine</h2>
        <label for="routine-select">Workout Routine:</label>
        <select id="routine-select" onchange="generateRoutineForm()">
            <option value="">Select Routine</option>
        </select>
        <div id="data-fetch-error" style="color: #ff4d4d; margin-top: 10px; display: none;"></div>
    </div>

    <div id="routine-form-container"></div>

    <div class="card">
        <h2>Recent Logs</h2>
        <div id="logContainer"></div>
    </div>

    <script>
        let db;
        let workoutsData = {};
        let toastTimeout;
        const DB_NAME = 'LiftTrackerDB';
        const DB_VERSION = 2;

        let timerInterval = null;
        let remainingTime = 60;
        let isTimerRunning = false;

        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = event => {
                    const dbInstance = event.target.result;
                    if (event.oldVersion < 2 && dbInstance.objectStoreNames.contains('workouts')) {
                        dbInstance.deleteObjectStore('workouts');
                    }
                    if (!dbInstance.objectStoreNames.contains('workouts')) {
                        dbInstance.createObjectStore('workouts', { keyPath: 'name' });
                    }
                    if (!dbInstance.objectStoreNames.contains('logs')) {
                        const logsStore = dbInstance.createObjectStore('logs', { keyPath: 'id', autoIncrement: true });
                        logsStore.createIndex('exercise', 'exercise', { unique: false });
                    }
                };
                request.onerror = event => { reject('Database error: ' + event.target.errorCode); };
                request.onsuccess = event => { db = event.target.result; resolve(db); };
            });
        }
        
        function fetchAndStoreWorkouts() {
            const errorDiv = document.getElementById('data-fetch-error');
            errorDiv.style.display = 'none';
            fetch('workouts.json')
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`Network response was not ok: ${response.statusText}`);
                    }
                    return response.json();
                })
                .then(data => {
                    const writeTransaction = db.transaction('workouts', 'readwrite');
                    const writeStore = writeTransaction.objectStore('workouts');
                    const keys = Object.keys(data);
                    keys.forEach(key => {
                        writeStore.put({ name: key, data: data[key] });
                    });
                    writeTransaction.oncomplete = () => {
                        workoutsData = data;
                        populateRoutines(data);
                    };
                })
                .catch(error => {
                    console.error('Failed to fetch or store workouts:', error);
                    errorDiv.textContent = 'Error: Could not load workout routines. Please check your connection and refresh.';
                    errorDiv.style.display = 'block';
                });
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('start-timer-btn').addEventListener('click', () => startTimer(60));
            document.getElementById('add-minute-btn').addEventListener('click', addMinute);
            document.getElementById('reset-timer-btn').addEventListener('click', resetTimer);
            updateTimerDisplay();

            initDB().then(() => {
                const transaction = db.transaction('workouts', 'readonly');
                const store = transaction.objectStore('workouts');
                const countRequest = store.count();
                countRequest.onsuccess = () => {
                    if (countRequest.result > 0) {
                        const getAllRequest = store.getAll();
                        getAllRequest.onsuccess = () => {
                            getAllRequest.result.forEach(item => { workoutsData[item.name] = item.data; });
                            populateRoutines(workoutsData);
                        };
                    } else {
                        fetchAndStoreWorkouts();
                    }
                };
                displayLogs();
            }).catch(error => {
                console.error('Failed to initialize database:', error);
                const errorDiv = document.getElementById('data-fetch-error');
                errorDiv.textContent = 'Error: Application database could not be opened. App may not function correctly.';
                errorDiv.style.display = 'block';
            });
        });

        function updateTimerDisplay() {
            const minutes = Math.floor(remainingTime / 60);
            const seconds = remainingTime % 60;
            document.getElementById('timer-display').textContent = 
                `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        function startTimer(duration) {
            if (isTimerRunning) {
                remainingTime += duration;
                return;
            }
            remainingTime = duration;
            isTimerRunning = true;
            document.getElementById('start-timer-btn').style.display = 'none';
            document.getElementById('add-minute-btn').style.display = 'inline-block';
            document.getElementById('reset-timer-btn').style.display = 'inline-block';
            
            timerInterval = setInterval(() => {
                remainingTime--;
                updateTimerDisplay();
                if (remainingTime <= 0) {
                    clearInterval(timerInterval);
                    isTimerRunning = false;
                    showToast("Rest period is over!");
                    resetTimer();
                }
            }, 1000);
        }

        function addMinute() {
            if (!isTimerRunning) return;
            remainingTime += 60;
            updateTimerDisplay();
        }

        function resetTimer() {
            clearInterval(timerInterval);
            isTimerRunning = false;
            remainingTime = 60;
            updateTimerDisplay();
            document.getElementById('start-timer-btn').style.display = 'inline-block';
            document.getElementById('add-minute-btn').style.display = 'none';
            document.getElementById('reset-timer-btn').style.display = 'none';
        }

        function showToast(message) {
            const toast = document.getElementById('toast-notification');
            toast.textContent = message;
            toast.className = 'show';
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.className = toast.className.replace('show', '');
            }, 3000);
        }

        function toggleSection(contentId) {
            const content = document.getElementById(contentId);
            const header = content.previousElementSibling;
            const icon = header.querySelector('.toggle-icon');

            if (content.style.display === 'none' || content.style.display === '') {
                content.style.display = 'block';
                icon.textContent = '▼';
            } else {
                content.style.display = 'none';
                icon.textContent = '▶';
            }
        }

        function populateRoutines(data) {
            const routineSelect = document.getElementById('routine-select');
            if (!routineSelect) return;
            routineSelect.innerHTML = '<option value="">Select Routine</option>';
            for (const routineName in data) {
                const option = document.createElement('option');
                option.value = routineName;
                option.textContent = routineName;
                routineSelect.appendChild(option);
            }
        }

        function generateRoutineForm() {
            const selectedRoutineName = document.getElementById('routine-select').value;
            const formContainer = document.getElementById('routine-form-container');
            if (!selectedRoutineName) { formContainer.innerHTML = ''; return; }
            
            const exercises = workoutsData[selectedRoutineName];
            let formHtml = `<div class="card" id="routine-form"><h2>${selectedRoutineName}</h2>`;

            let warmupHtml = '';
            let liftHtml = '';
            let cooldownHtml = '';

            exercises.forEach((exercise, index) => {
                const sanitizedRoutineName = selectedRoutineName.replace(/'/g, "\\'");
                const sanitizedExerciseName = exercise.exercise_name.replace(/'/g, "\\'");
                
                if (exercise.category === 'Warm-up') {
                    warmupHtml += `<div class="warmup-entry"><strong style="color: #d4af37; cursor: pointer;" onclick='showExerciseDetails("${sanitizedRoutineName}", ${index})'>${exercise.exercise_name}</strong></div>`;
                } else if (exercise.category === 'Lift') {
                    liftHtml += `<div class="log-entry">
                                    <strong style="color: #d4af37; cursor: pointer;" onclick='showExerciseDetails("${sanitizedRoutineName}", ${index})'>${exercise.exercise_name}</strong>`;
                    for (let i = 0; i < 3; i++) {
                        liftHtml += `<div class="lift-form-row">
                                        <input type="number" id="weight-${index}-${i}" step="0.5" placeholder="Weight (lbs)">
                                        <input type="number" id="reps-${index}-${i}" placeholder="Reps">
                                        <button onclick="logSet(${index}, ${i}, '${sanitizedExerciseName}')">Log Set ${i + 1}</button>
                                     </div>`;
                    }
                    liftHtml += `</div>`;
                } else if (exercise.category === 'Cool-down') {
                    cooldownHtml += `<div class="warmup-entry"><strong style="color: #d4af37; cursor: pointer;" onclick='showExerciseDetails("${sanitizedRoutineName}", ${index})'>${exercise.exercise_name}</strong></div>`;
                }
            });

            if (warmupHtml) {
                formHtml += `<h3 class="routine-section-header" onclick="toggleSection('warmup-content')">
                                <span>Warm-up</span><span class="toggle-icon">▼</span>
                             </h3>
                             <div id="warmup-content" class="collapsible-content">${warmupHtml}</div>`;
            }

            if (liftHtml) {
                formHtml += `<h3 class="routine-section-header" onclick="toggleSection('working-sets-content')">
                                <span>Working Sets</span><span class="toggle-icon">▼</span>
                             </h3>
                             <div id="working-sets-content" class="collapsible-content">${liftHtml}</div>`;
            }

            if (cooldownHtml) {
                formHtml += `<h3 class="routine-section-header" onclick="toggleSection('cooldown-content')">
                                <span>Cool-down</span><span class="toggle-icon">▶</span>
                             </h3>
                             <div id="cooldown-content" class="collapsible-content" style="display: none;">${cooldownHtml}</div>`;
            }

            formHtml += `</div>`;
            formContainer.innerHTML = formHtml;
        }
        
        async function logSet(exerciseIndex, setIndex, exerciseName) {
            const weightInput = document.getElementById(`weight-${exerciseIndex}-${setIndex}`);
            const repsInput = document.getElementById(`reps-${exerciseIndex}-${setIndex}`);
            if (!weightInput || !repsInput) return;

            const weight = parseFloat(weightInput.value);
            const reps = parseInt(repsInput.value);

            if (!exerciseName || isNaN(weight) || isNaN(reps) || weight <= 0 || reps <= 0) {
                showToast("Please enter valid weight and reps for the set.");
                return;
            }

            const est1RM = calculate1RM(weight, reps);
            const logEntry = {
                timestamp: Date.now(),
                date: new Date().toLocaleDateString(),
                exercise: exerciseName,
                weight: weight,
                reps: reps,
                est1RM: est1RM,
                isPR: false 
            };
            
            const transaction = db.transaction('logs', 'readwrite');
            const store = transaction.objectStore('logs');
            const index = store.index('exercise');
            const getAllRequest = index.getAll(exerciseName);

            getAllRequest.onsuccess = () => {
                const allPreviousLogs = getAllRequest.result;
                const maxEst1RM = allPreviousLogs.length > 0 
                    ? Math.max(...allPreviousLogs.map(log => log.est1RM))
                    : 0;

                if (est1RM > maxEst1RM) {
                    logEntry.isPR = true;
                }

                const addRequest = store.add(logEntry);
                addRequest.onsuccess = () => {
                    displayLogs();
                    let toastMessage = `Set ${setIndex + 1} logged!`;
                    if (logEntry.isPR) {
                        toastMessage += " ✨ New PR!";
                    }
                    showToast(toastMessage);
                    startTimer(90);
                    weightInput.disabled = true;
                    repsInput.disabled = true;
                    weightInput.style.backgroundColor = "#222";
                    repsInput.style.backgroundColor = "#222";
                };
                addRequest.onerror = () => {
                     showToast('Error logging set.');
                };
            };

            getAllRequest.onerror = () => {
                showToast('Could not verify PR status, but logging set.');
                store.add(logEntry);
            };
        }
        
        function showExerciseDetails(routineName, exerciseIndex) {
            const exercise = workoutsData[routineName][exerciseIndex];
            if (!exercise) return;
            document.getElementById('details-title').textContent = exercise.exercise_name;
            const contentEl = document.getElementById('details-content');
            contentEl.innerHTML = `
                <p><strong>Category:</strong> ${exercise.category}</p>
                <p><strong>Targets:</strong> ${exercise.targets}</p>
                <p><strong>Biomechanics:</strong> ${exercise.biomechanics}</p>
                <p><strong>How To:</strong> ${exercise.how_to}</p>
            `;
            document.getElementById('exercise-details-modal').style.display = 'block';
        }

        function closeExerciseDetailsModal() { document.getElementById('exercise-details-modal').style.display = 'none'; }
        function calculate1RM(weight, reps) { return reps === 1 ? weight : Math.round(weight * (1 + reps / 30)); }

        function displayLogs() {
            const transaction = db.transaction('logs', 'readonly');
            const store = transaction.objectStore('logs');
            const getAllRequest = store.getAll();

            getAllRequest.onsuccess = () => {
                const allLogs = getAllRequest.result;
                const container = document.getElementById('logContainer');

                if (allLogs.length === 0) {
                    container.innerHTML = "No sets logged yet.";
                    return;
                }

                const exerciseMax1RM = {};
                for (const log of allLogs) {
                    if (!exerciseMax1RM[log.exercise] || log.est1RM > exerciseMax1RM[log.exercise]) {
                        exerciseMax1RM[log.exercise] = log.est1RM;
                    }
                }

                const sortedLogs = allLogs.sort((a, b) => b.timestamp - a.timestamp);
                
                container.innerHTML = sortedLogs.slice(0, 50).map(log => {
                    const safeExerciseName = log.exercise.replace(/'/g, "\\'");
                    
                    const isAllTimePR = log.isPR && log.est1RM === exerciseMax1RM[log.exercise];
                    const prBadge = isAllTimePR ? `<span class="pr-badge">✨ All-Time PR!</span>` : '';

                    return `
                    <div class="log-entry">
                        <strong>${log.date} - <span style="color: #d4af37; cursor: pointer;" onclick="showProgressSummary('${safeExerciseName}')">${log.exercise}</span></strong><br>
                        Lifted: ${log.weight} x ${log.reps} reps <br>
                        <span class="rm-highlight">Est. 1RM: ${log.est1RM}</span> ${prBadge}
                        <div class="log-actions">
                            <button class="edit-button" onclick="editLog(${log.id})">Edit</button>
                            <button class="delete-button" onclick="deleteLog(${log.id})">Delete</button>
                        </div>
                    </div>`;
                }).join('');
            };
        }

        function deleteLog(key) {
            if (!confirm('Are you sure you want to delete this log?')) return;
            const transaction = db.transaction('logs', 'readwrite');
            const store = transaction.objectStore('logs');
            store.delete(key);
            transaction.oncomplete = () => { displayLogs(); showToast('Log deleted.'); };
        }

        function editLog(key) {
            const transaction = db.transaction('logs', 'readonly');
            const store = transaction.objectStore('logs');
            const getRequest = store.get(key);
            getRequest.onsuccess = () => {
                const log = getRequest.result;
                document.getElementById('edit-exercise').value = log.exercise;
                document.getElementById('edit-weight').value = log.weight;
                document.getElementById('edit-reps').value = log.reps;
                document.getElementById('edit-key').value = log.id;
                document.getElementById('edit-log-container').style.display = 'block';
                window.scrollTo(0, 0);
            };
        }

        function cancelEdit() { document.getElementById('edit-log-container').style.display = 'none'; }

        function updateLog() {
            const weight = parseFloat(document.getElementById('edit-weight').value);
            const reps = parseInt(document.getElementById('edit-reps').value);
            const key = parseInt(document.getElementById('edit-key').value, 10);
            if (isNaN(weight) || isNaN(reps) || weight <= 0 || reps <= 0) { showToast("Please enter valid weight and reps."); return; }
            const transaction = db.transaction('logs', 'readwrite');
            const store = transaction.objectStore('logs');
            const getRequest = store.get(key);
            getRequest.onsuccess = () => {
                const logToUpdate = getRequest.result;
                logToUpdate.weight = weight;
                logToUpdate.reps = reps;
                logToUpdate.est1RM = calculate1RM(weight, reps);
                logToUpdate.date = new Date().toLocaleDateString() + " (edited)";
                logToUpdate.timestamp = Date.now();
                
                logToUpdate.isPR = false;

                store.put(logToUpdate);
            };
            transaction.oncomplete = () => { displayLogs(); cancelEdit(); showToast('Set updated successfully!'); };
        }

        function showProgressSummary(exerciseName) {
            const transaction = db.transaction('logs', 'readonly');
            const store = transaction.objectStore('logs');
            const index = store.index('exercise');
            const getAllRequest = index.getAll(exerciseName);

            getAllRequest.onsuccess = () => {
                const logs = getAllRequest.result;
                if (logs.length < 1) { showToast("No data available for this exercise."); return; }

                logs.sort((a, b) => a.timestamp - b.timestamp);

                const bestSet = logs.reduce((prev, current) => (prev.est1RM > current.est1RM) ? prev : current);
                const firstSet = logs[0];
                const latestSet = logs[logs.length - 1];

                const improvement = firstSet.est1RM > 0 
                    ? ((bestSet.est1RM - firstSet.est1RM) / firstSet.est1RM * 100).toFixed(1)
                    : 0;

                document.getElementById('summary-title').textContent = `${exerciseName} Progress`;
                const contentEl = document.getElementById('summary-content');
                contentEl.innerHTML = `
                    <div class="summary-section">
                        <strong>Best vs. Latest (Est. 1RM)</strong><br>
                        All-Time Best: <span class="rm-highlight">${bestSet.est1RM}</span><br>
                        Most Recent: <span class="rm-highlight">${latestSet.est1RM}</span>
                    </div>
                    <div class="summary-section">
                        <strong>Set Details</strong><br>
                        <small>Best: ${bestSet.weight} lbs x ${bestSet.reps} reps (on ${bestSet.date})</small><br>
                        <small>Latest: ${latestSet.weight} lbs x ${latestSet.reps} reps (on ${latestSet.date})</small>
                    </div>
                     <div class="summary-section">
                        <strong>Journey</strong><br>
                        <small>Started at: ${firstSet.est1RM} (on ${firstSet.date})</small><br>
                        <strong>Total Improvement:</strong> ${improvement >= 0 ? `+${improvement}` : improvement}%
                    </div>
                `;
                document.getElementById('progress-summary-modal').style.display = 'block';
            };
            getAllRequest.onerror = () => {
                showToast("Could not retrieve progress data.");
            }
        }

        function closeProgressSummaryModal() { document.getElementById('progress-summary-modal').style.display = 'none'; }
        
        if ('serviceWorker' in navigator) { window.addEventListener('load', => { navigator.serviceWorker.register('./sw.js'); }); }
    </script>
</body>
</html>
