<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Workout Tracker</title>
    
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WorkoutTracker">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-512.png">

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    
    <style>
        /* CSS styles are unchanged and correct */
        :root {
            --bg-color: #000000;
            --card-bg: #121212;
            --surface-bg: #1e1e1e;
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --gold-primary: #D4AF37; 
            --gold-hover: #b5952f;
            --gold-glow: rgba(212, 175, 55, 0.3);
            --danger-color: #ef4444;
            --success-color: #22c55e;
            --border-color: #2a2a2a;
            --chart-grid: rgba(255, 255, 255, 0.05);
            --radius-lg: 16px;
            --radius-md: 10px;
            --radius-sm: 6px;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            max-width: 500px; 
            margin: 0 auto; 
            padding: 1rem 1rem 4rem 1rem; 
            background: var(--bg-color); 
            color: var(--text-primary); 
            -webkit-tap-highlight-color: transparent; 
            overscroll-behavior-y: none;
            line-height: 1.5;
        }
        
        h1 { font-size: 1.75rem; font-weight: 800; color: var(--gold-primary); margin: 0.5rem 0 1.5rem 0; text-transform: uppercase; letter-spacing: 1.5px; }
        h2 { margin: 0 0 1rem 0; font-size: 1.25rem; font-weight: 700; color: var(--text-primary); display: flex; align-items: center; gap: 0.5rem; }
        label { font-size: 0.85rem; color: var(--text-secondary); font-weight: 500; margin-bottom: 0.3rem; display: block; }

        .card { 
            background: var(--card-bg); 
            padding: 1.25rem; 
            border-radius: var(--radius-lg); 
            margin-bottom: 1.25rem; 
            border: 1px solid var(--border-color); 
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .form-group { margin-bottom: 1rem; }
        .form-row { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 1rem; 
        }
        .form-row .form-group { margin-bottom: 0; }

        input, select { 
            width: 100%;
            box-sizing: border-box;
            background: var(--surface-bg); 
            color: var(--text-primary); 
            padding: 0.875rem 1rem; 
            border: 1px solid var(--border-color); 
            border-radius: var(--radius-md); 
            font-size: 1rem; 
            -webkit-appearance: none; 
            transition: all 0.2s ease; 
        }
        input::placeholder { color: #6b7280; }
        input:focus, select:focus { 
            outline: none; 
            border-color: var(--gold-primary); 
            box-shadow: 0 0 0 3px var(--gold-glow);
        }
        
        button { 
            background: var(--gold-primary); 
            color: #000; 
            border: none; 
            cursor: pointer; 
            font-weight: 700; 
            padding: 0.875rem; 
            border-radius: var(--radius-md); 
            font-size: 1rem; 
            transition: transform 0.1s, background 0.2s, box-shadow 0.2s; 
            width: 100%;
        }
        button:hover { background: var(--gold-hover); }
        button:active { transform: scale(0.97); } 
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-top: 0.5rem; }
        .btn-group button { width: 100%; margin: 0; }
        .cancel-btn { background: var(--surface-bg); color: var(--text-primary); border: 1px solid var(--border-color); display: none; }
        .cancel-btn:hover { background: #2a2a2a; }
        
        .timer-card { 
            position: sticky; 
            top: 10px; 
            z-index: 100; 
            padding: 1rem 1.25rem; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            gap: 1rem; 
            background: rgba(18, 18, 18, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.4); 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        .timer-display { font-size: 2.25rem; font-weight: 800; margin: 0; color: var(--text-primary); font-variant-numeric: tabular-nums; line-height: 1; }
        .timer-display.active { animation: timerPulse 2s infinite; }
        @keyframes timerPulse { 
            0% { color: var(--text-primary); } 
            50% { color: var(--gold-primary); text-shadow: 0 0 10px var(--gold-glow); } 
            100% { color: var(--text-primary); } 
        }
        .timer-controls { display: flex; gap: 0.5rem; }
        .timer-btn { padding: 0.6rem 1rem; border-radius: var(--radius-sm); font-size: 0.9rem; width: auto; }
        .add-min-btn { background: transparent; border: 1px solid var(--gold-primary); color: var(--gold-primary); }
        .add-min-btn:hover { background: rgba(212, 175, 55, 0.1); }
        .stop-btn { background: var(--surface-bg); color: var(--text-primary); border: 1px solid var(--border-color); }
        
        .session-group { margin-top: 1rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); overflow: hidden; background: var(--surface-bg); }
        .session-header { background: rgba(212, 175, 55, 0.05); padding: 0.75rem 1rem; margin: 0; font-size: 0.95rem; font-weight: 700; border-bottom: 1px solid var(--border-color); color: var(--gold-primary); }
        
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th, td { text-align: left; padding: 0.85rem 1rem; border-bottom: 1px solid var(--border-color); }
        tr:last-child td { border-bottom: none; }
        th { color: var(--text-secondary); font-weight: 600; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.5px; background: rgba(0,0,0,0.2); }
        
        .pr-gold { color: var(--gold-primary); font-weight: 700; text-shadow: 0 0 8px rgba(212, 175, 55, 0.2); }
        
        .action-btn { padding: 0.35rem 0.6rem; font-size: 0.75rem; border-radius: var(--radius-sm); cursor: pointer; display: inline-block; margin-right: 0.25rem; border: 1px solid; background: transparent; width: auto; }
        .edit-btn { border-color: var(--gold-primary); color: var(--gold-primary); }
        .edit-btn:hover { background: rgba(212, 175, 55, 0.1); }
        .del-btn { border-color: var(--danger-color); color: var(--danger-color); }
        .del-btn:hover { background: rgba(239, 68, 68, 0.1); }
        
        .footer-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; margin-top: 1.5rem; }
        .footer-actions button { padding: 0.75rem 0.5rem; font-size: 0.85rem; background: var(--surface-bg); border: 1px solid var(--border-color); color: var(--text-primary); }
        .footer-actions button:hover { background: #2a2a2a; border-color: var(--gold-primary); color: var(--gold-primary); }
        .footer-actions .danger-btn:hover { border-color: var(--danger-color); color: var(--danger-color); }
        
        canvas { max-width: 100%; margin-top: 1rem; }

        #toast { visibility: hidden; min-width: 250px; background-color: var(--surface-bg); border: 1px solid var(--border-color); color: var(--text-primary); text-align: center; border-radius: var(--radius-md); padding: 16px; position: fixed; z-index: 1000; left: 50%; transform: translateX(-50%) translateY(20px); bottom: 30px; font-size: 0.95rem; font-weight: 500; transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55); opacity: 0; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.8); }
        #toast.show { visibility: visible; opacity: 1; transform: translateX(-50%) translateY(0); }
        #toast.error { border-left: 4px solid var(--danger-color); }
        #toast.success { border-left: 4px solid var(--success-color); }
    </style>
</head>
<body>
    
    <header class="header-container">
        <h1>WorkoutTracker</h1>
    </header>
    
    <main>
        <div class="card timer-card">
            <div class="timer-display" id="timerDisplay" aria-live="polite">01:00</div>
            <div class="timer-controls">
                <button class="timer-btn add-min-btn" onclick="addMinute()">+1 Min</button>
                <button class="timer-btn stop-btn" onclick="stopTimer()">Reset</button>
            </div>
        </div>

        <div class="card">
            <h2 id="formTitle">Log a Set</h2>
            
            <div class="form-group">
                <label for="exercise">Exercise</label>
                <input type="text" id="exercise" list="exerciseOptions" placeholder="Start typing..." autocomplete="off" required>
                <datalist id="exerciseOptions"></datalist>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="weight">Weight</label>
                    <input type="number" id="weight" placeholder="Weight" required>
                </div>
                <div class="form-group">
                    <label for="reps">Reps</label>
                    <input type="number" id="reps" placeholder="Reps" required>
                </div>
            </div>
            
            <div class="btn-group">
                <button id="submitBtn" onclick="processSet()">Log Set</button>
                <button id="cancelEditBtn" class="cancel-btn" onclick="cancelEdit()">Cancel</button>
            </div>
        </div>

        <div class="card">
            <h2>🏆 Personal Bests (PRs)</h2>
            <div id="prContainer"></div>
        </div>

        <div class="card">
            <h2>📈 Progress Chart (1RM)</h2>
            <div class="form-group">
                <label for="chartExerciseSelect">Select Exercise to Chart</label>
                <select id="chartExerciseSelect" onchange="updateChart()">
                    <option value="">-- Select an Exercise --</option>
                </select>
            </div>
            <canvas id="progressChart"></canvas>
        </div>

        <div class="card">
            <h2>History</h2>
            <div id="historyContainer"></div>
            
            <input type="file" id="csvFileInput" accept=".csv" style="display: none;" onchange="importFromCSV(event)">
            
            <div class="footer-actions">
                <button onclick="document.getElementById('csvFileInput').click()">📂 Import</button>
                <button onclick="exportToCSV()">💾 Export</button>
                <button class="danger-btn" onclick="clearAllData()">🗑️ Clear</button>
            </div>
        </div>
    </main>

    <div id="toast" role="alert" aria-live="assertive"></div>

    <script>
        const timerDisplayEl = document.getElementById('timerDisplay');
        const formTitleEl = document.getElementById('formTitle');
        const exerciseInputEl = document.getElementById('exercise');
        const weightInputEl = document.getElementById('weight');
        const repsInputEl = document.getElementById('reps');
        const exerciseOptionsEl = document.getElementById('exerciseOptions');
        const submitBtnEl = document.getElementById('submitBtn');
        const cancelEditBtnEl = document.getElementById('cancelEditBtn');
        const prContainerEl = document.getElementById('prContainer');
        const chartExerciseSelectEl = document.getElementById('chartExerciseSelect');
        const historyContainerEl = document.getElementById('historyContainer');
        const toastEl = document.getElementById('toast');
        
        const defaultExercises = [
            "Bench Press", "Squat", "Deadlift", "Overhead Press", 
            "Barbell Row", "Pull Up", "Dumbbell Curl", "Leg Press", 
            "Romanian Deadlift", "Front Squat", "Lat Pulldown", "Tricep Extension"
        ];

        let timerInterval;
        let timeRemaining = 60;
        let isTimerRunning = false;
        let workouts = [];
        let chartInstance = null;
        let editingIndex = null;
        let audioCtx;
        let audioInitialized = false;

        function initAudio() {
            if (audioInitialized) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                audioInitialized = true;
                console.log("Audio Context initialized.");
            } catch (e) {
                console.error("Audio Context not supported or failed to initialize.", e);
            }
        }
        
        // Add event listeners to initialize audio on user interaction
        ['click', 'touchstart'].forEach(evt => {
            document.body.addEventListener(evt, initAudio, { once: true });
        });

        function showToast(message, type = 'info') { 
            toastEl.textContent = message;
            toastEl.className = 'show';
            if (type === 'success') toastEl.classList.add('success');
            if (type === 'error') toastEl.classList.add('error');
            
            setTimeout(() => { 
                toastEl.className = toastEl.className.replace(/show|success|error/g, '').trim(); 
            }, 3000);
        }

        function startTimer() {
            if (isTimerRunning) return;
            initAudio(); // Ensure audio is ready
            timeRemaining = 60;
            isTimerRunning = true;
            timerDisplayEl.classList.add('active');
            updateTimerUI(timeRemaining);

            timerInterval = setInterval(() => {
                timeRemaining--;
                updateTimerUI(timeRemaining);
                if (timeRemaining <= 0) {
                    clearInterval(timerInterval);
                    isTimerRunning = false;
                    timerDisplayEl.classList.remove('active');
                    playBeep();
                    timeRemaining = 60;
                    updateTimerUI(timeRemaining);
                }
            }, 1000);
        }

        function addMinute() {
            initAudio(); // Ensure audio is ready
            timeRemaining += 60;
            updateTimerUI(timeRemaining);
        }

        function stopTimer() {
            clearInterval(timerInterval);
            isTimerRunning = false;
            timerDisplayEl.classList.remove('active');
            timeRemaining = 60; 
            updateTimerUI(timeRemaining);
        }

        function updateTimerUI(seconds) {
            const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
            const secs = (seconds % 60).toString().padStart(2, '0');
            const timeString = `${mins}:${secs}`;
            timerDisplayEl.innerText = timeString;
            document.title = (isTimerRunning && seconds > 0) ? `(${timeString}) Resting...` : 'WorkoutTracker';
        }

        function playBeep() {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            try {
                const osc = audioCtx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, audioCtx.currentTime);
                osc.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.5);
            } catch (e) { 
                console.error("Audio playback failed.", e); 
            }
        }

        window.onload = function() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./sw.js')
                    .then(() => console.log('Service Worker Registered'))
                    .catch(err => console.error('Service Worker registration failed:', err));
            }
            
            try {
                const savedData = localStorage.getItem('workoutData');
                if (savedData) {
                    workouts = JSON.parse(savedData);
                    workouts.sort((a, b) => new Date(b.date) - new Date(a.date));
                }
            } catch (e) {
                console.error("Local Storage parsing failed:", e);
                showToast("Could not load your history. File may be corrupt.", "error");
            }
            
            renderHistory();
            renderPRs();
            updateExerciseDropdowns();
            updateChart();
        };

        function calculate1RM(weight, reps) {
            if (reps === 1) return weight;
            return Math.round(weight * (1 + reps / 30));
        }

        function normalizeExerciseName(str) {
            if (!str) return '';
            return str.trim().toLowerCase().split(/\s+/).map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
        }

        function processSet() {
            const exercise = normalizeExerciseName(exerciseInputEl.value);
            const weight = parseFloat(weightInputEl.value);
            const reps = parseInt(repsInputEl.value);

            if (!exercise || isNaN(weight) || isNaN(reps) || weight < 0 || reps < 0) {
                showToast("Please enter valid exercise details.", "error");
                return;
            }

            const estimated1RM = calculate1RM(weight, reps);

            if (editingIndex !== null) {
                workouts[editingIndex] = { ...workouts[editingIndex], exercise, weight, reps, estimated1RM };
                showToast("Set updated successfully!", "success");
                cancelEdit(); // Reset form after update
            } else {
                const date = new Date().toISOString().slice(0, 10);
                workouts.unshift({ date, exercise, weight, reps, estimated1RM });
                startTimer();
            }

            saveAndRender();
            
            weightInputEl.value = '';
            repsInputEl.value = '';
            exerciseInputEl.value = '';
            exerciseInputEl.focus();
        }

        function saveAndRender() {
            try {
                localStorage.setItem('workoutData', JSON.stringify(workouts));
            } catch (e) {
                console.error("Local Storage write failed:", e);
                showToast("Error saving data. Storage may be full.", "error");
            }
            
            renderHistory();
            renderPRs();
            updateExerciseDropdowns();
            updateChart();
        }

        function editSet(index) {
            editingIndex = index;
            const workout = workouts[index];
            exerciseInputEl.value = workout.exercise;
            weightInputEl.value = workout.weight;
            repsInputEl.value = workout.reps;
            formTitleEl.innerText = `Edit Set (${formatDateForDisplay(workout.date)})`;
            submitBtnEl.innerText = 'Update Set';
            cancelEditBtnEl.style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cancelEdit() {
            editingIndex = null;
            weightInputEl.value = '';
            repsInputEl.value = '';
            exerciseInputEl.value = '';
            formTitleEl.innerText = 'Log a Set';
            submitBtnEl.innerText = 'Log Set';
            cancelEditBtnEl.style.display = 'none';
        }

        function deleteSet(index) {
            if (confirm("Are you sure you want to delete this set?")) {
                workouts.splice(index, 1);
                if (editingIndex === index) cancelEdit();
                saveAndRender();
                showToast("Set deleted.", "info");
            }
        }
        
        function formatDateForDisplay(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString + 'T00:00:00'); // Avoid time zone issues
            return date.toLocaleDateString(undefined, { month: '2-digit', day: '2-digit', year: 'numeric' });
        }

        function renderHistory() {
            if (workouts.length === 0) {
                historyContainerEl.innerHTML = '<p style="color: var(--text-secondary);">No workouts logged yet.</p>';
                return;
            }
            const grouped = workouts.reduce((acc, workout, index) => {
                const date = workout.date;
                if (!acc[date]) acc[date] = [];
                acc[date].push({ ...workout, originalIndex: index });
                return acc;
            }, {});
            
            historyContainerEl.innerHTML = Object.keys(grouped).sort().reverse().map(date => `
                <div class="session-group">
                    <h3 class="session-header">📅 ${formatDateForDisplay(date)}</h3>
                    <table>
                        <thead>
                            <tr><th>Exercise</th><th>W × R</th><th>1RM</th><th>Actions</th></tr>
                        </thead>
                        <tbody>
                            ${grouped[date].map(item => `
                                <tr>
                                    <td>${item.exercise}</td>
                                    <td>${item.weight} × ${item.reps}</td>
                                    <td><strong>${item.estimated1RM}</strong></td>
                                    <td style="white-space: nowrap;">
                                        <button class="action-btn edit-btn" onclick="editSet(${item.originalIndex})">Edit</button>
                                        <button class="action-btn del-btn" onclick="deleteSet(${item.originalIndex})">Del</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `).join('');
        }

        function renderPRs() {
            if (workouts.length === 0) {
                prContainerEl.innerHTML = '<p style="color: var(--text-secondary); margin: 0;">Log a workout to see personal records.</p>';
                return;
            }
            const prs = workouts.reduce((acc, w) => {
                if (!acc[w.exercise] || w.estimated1RM > acc[w.exercise].estimated1RM) {
                    acc[w.exercise] = w;
                }
                return acc;
            }, {});
            const sortedPRExercises = Object.keys(prs).sort();
            prContainerEl.innerHTML = `
                <table>
                    <thead><tr><th>Exercise</th><th>Best Set</th><th>Best 1RM</th></tr></thead>
                    <tbody>
                        ${sortedPRExercises.map(exName => `
                            <tr>
                                <td><strong>${prs[exName].exercise}</strong></td>
                                <td>${prs[exName].weight} × ${prs[exName].reps}</td>
                                <td class="pr-gold">★ ${prs[exName].estimated1RM}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        function updateExerciseDropdowns() {
            const historyExercises = workouts.map(w => w.exercise);
            const combinedExercises = [...new Set([...defaultExercises, ...historyExercises])].sort();
            exerciseOptionsEl.innerHTML = combinedExercises.map(ex => `<option value="${ex}"></option>`).join('');

            const currentChartValue = chartExerciseSelectEl.value;
            const uniqueLoggedExercises = [...new Set(workouts.map(w => w.exercise))].sort();
            
            chartExerciseSelectEl.innerHTML = '<option value="">-- Select an Exercise --</option>' + 
                uniqueLoggedExercises.map(ex => `<option value="${ex}">${ex}</option>`).join('');

            if (uniqueLoggedExercises.includes(currentChartValue)) {
                chartExerciseSelectEl.value = currentChartValue;
            } else if (uniqueLoggedExercises.length > 0 && !currentChartValue) {
                 chartExerciseSelectEl.value = uniqueLoggedExercises[0];
            }
        }

        function updateChart() {
            const selectedExercise = chartExerciseSelectEl.value;
            const canvas = document.getElementById('progressChart');
            
            if (chartInstance) {
                chartInstance.destroy(); // Always destroy old instance
                chartInstance = null;
            }

            if (!selectedExercise) {
                canvas.style.display = 'none';
                return;
            }
            canvas.style.display = 'block';

            const dailyMax = workouts
                .filter(w => w.exercise === selectedExercise)
                .reduce((acc, w) => {
                    if (!acc[w.date] || w.estimated1RM > acc[w.date]) acc[w.date] = w.estimated1RM;
                    return acc;
                }, {});

            const sortedDates = Object.keys(dailyMax).sort((a, b) => new Date(a) - new Date(b));
            const chartData = sortedDates.map(date => dailyMax[date]);
            renderChartCanvas(sortedDates, chartData, selectedExercise);
        }
        
        function renderChartCanvas(labels, data, exerciseName) {
            const ctx = document.getElementById('progressChart').getContext('2d');
            const rootStyle = getComputedStyle(document.documentElement);
            const goldColor = rootStyle.getPropertyValue('--gold-primary').trim();
            const gridColor = rootStyle.getPropertyValue('--chart-grid').trim();
            const textColor = rootStyle.getPropertyValue('--text-secondary').trim();
            
            const formattedLabels = labels.map(dateStr => dateStr.substring(5));
            Chart.defaults.color = textColor;

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: formattedLabels,
                    datasets: [{
                        label: `Est. 1RM for ${exerciseName}`,
                        data: data,
                        borderColor: goldColor,
                        backgroundColor: 'rgba(212, 175, 55, 0.15)',
                        borderWidth: 2,
                        pointBackgroundColor: goldColor,
                        fill: true,
                        tension: 0.1
                    }]
                },
                options: { responsive: true, scales: { y: { beginAtZero: false, title: { display: true, text: 'Weight' }, grid: { color: gridColor } }, x: { grid: { color: gridColor } } } }
            });
        }

        function exportToCSV() {
            if (workouts.length === 0) {
                showToast("No data to export.", "error");
                return;
            }
            let csvContent = "Date,Exercise,Weight,Reps,Estimated 1RM\n";
            const sortedForExport = [...workouts].sort((a,b) => new Date(a.date) - new Date(b.date));
            sortedForExport.forEach(w => {
                const safeExercise = `"${w.exercise.replace(/"/g, '""')}"`;
                csvContent += `${w.date},${safeExercise},${w.weight},${w.reps},${w.estimated1RM}\n`;
            });
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", `workout_history_${new Date().toISOString().slice(0,10)}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            showToast("Backup CSV file exported!", "success");
        }

        function parseCSVLine(text) {
            const result = [];
            let insideQuote = false;
            let entry = '';
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                if (char === '"' && text[i+1] === '"') { entry += '"'; i++; } 
                else if (char === '"') { insideQuote = !insideQuote; } 
                else if (char === ',' && !insideQuote) { result.push(entry.trim()); entry = ''; } 
                else { entry += char; }
            }
            result.push(entry.trim());
            return result;
        }

        // IMPROVEMENT: Simplified and more robust date parsing for YYYY-MM-DD format
        function parseDateFromCSV(dateString) {
            if (!dateString) return null;
            const cleanStr = dateString.replace(/"/g, '').trim();
            // Validates that the date is in YYYY-MM-DD format, which the app uses internally.
            if (/^\d{4}-\d{2}-\d{2}$/.test(cleanStr)) {
                return cleanStr;
            }
            return null; // Return null for any other format to ensure data consistency
        }

        function importFromCSV(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const lines = e.target.result.split(/\r?\n/).filter(line => line.trim() !== '');
                if (lines.length <= 1) {
                    showToast("CSV file is empty or invalid.", "error");
                    return;
                }
                
                let importedWorkouts = [];
                for (let i = 1; i < lines.length; i++) {
                    try {
                        const row = parseCSVLine(lines[i]);
                        if (row.length < 4) continue;
                        
                        const date = parseDateFromCSV(row[0]);
                        const exercise = row[1].replace(/"/g, "");
                        const weight = parseFloat(row[2]);
                        const reps = parseInt(row[3]);
                        
                        if (date && exercise && !isNaN(weight) && !isNaN(reps)) {
                            const estimated1RM = parseInt(row[4]) || calculate1RM(weight, reps);
                            importedWorkouts.push({ date, exercise, weight, reps, estimated1RM });
                        }
                    } catch (err) {
                        console.error(`Skipping invalid CSV line ${i+1}: ${lines[i]}`, err);
                    }
                }

                if (importedWorkouts.length > 0) {
                    workouts = [...workouts, ...importedWorkouts];
                    workouts.sort((a, b) => new Date(b.date) - new Date(a.date));
                    saveAndRender();
                    showToast(`Successfully imported ${importedWorkouts.length} sets!`, 'success');
                } else {
                    showToast("No valid workout data found in the CSV.", "error");
                }
            };
            reader.readAsText(file);
            event.target.value = ''; // Reset file input
        }

        function clearAllData() {
            if (confirm("DELETE ALL workout data? This cannot be undone.")) {
                if (confirm("Are you absolutely sure? All history will be permanently erased.")) {
                    workouts = [];
                    localStorage.removeItem('workoutData');
                    cancelEdit(); // Reset form state
                    saveAndRender();
                    showToast("All data has been cleared.", "info");
                }
            }
        }
    </script>
