<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Tracker</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="exerciseDetailsContainer" class="card" style="display: none;"></div>

    <div class="card">
        <h2 id="form-title">Log Set</h2>
        
        <label for="exercise">Exercise:</label>
        <select id="exercise" onchange="displayExerciseDetails()">
            <option value="">Select Exercise</option>
        </select>
        
        <label for="weight">Weight (lbs):</label>
        <input type="number" id="weight" step="0.5">
        
        <label for="reps">Reps:</label>
        <input type="number" id="reps">
        
        <input type="hidden" id="edit-index">
        <button id="log-button" onclick="logWorkout()">Log Set</button>
        <button id="cancel-button" onclick="resetForm()" style="display: none;">Cancel</button>
    </div>

    <div class="card">
        <h2>Recent Logs</h2>
        <div id="logContainer"></div>
    </div>

    <script>
        let workoutsData = {};

        document.addEventListener('DOMContentLoaded', function() {
            const cachedData = localStorage.getItem('workoutsData');
            
            if (cachedData) {
                workoutsData = JSON.parse(cachedData);
                populateExercises(workoutsData);
            } else {
                fetch('workouts.json')
                    .then(response => response.json())
                    .then(data => {
                        localStorage.setItem('workoutsData', JSON.stringify(data));
                        workoutsData = data;
                        populateExercises(data);
                    })
                    .catch(error => console.error(error));
            }
            
            displayLogs();
        });

        function populateExercises(data) {
            const exerciseSelect = document.getElementById('exercise');
            for (const category in data) {
                const optgroup = document.createElement('optgroup');
                optgroup.label = category;
                data[category].forEach(exercise => {
                    const option = document.createElement('option');
                    option.value = exercise.exercise_name;
                    option.textContent = exercise.exercise_name;
                    optgroup.appendChild(option);
                });
                exerciseSelect.appendChild(optgroup);
            }
        }

        function displayExerciseDetails() {
            const selectedExerciseName = document.getElementById('exercise').value;
            const detailsContainer = document.getElementById('exerciseDetailsContainer');

            if (!selectedExerciseName) {
                detailsContainer.style.display = 'none';
                return;
            }

            let exerciseDetails = null;
            for (const category in workoutsData) {
                const found = workoutsData[category].find(ex => ex.exercise_name === selectedExerciseName);
                if (found) {
                    exerciseDetails = found;
                    break;
                }
            }

            if (exerciseDetails) {
                let html = `<button class="close-button" onclick="document.getElementById('exerciseDetailsContainer').style.display='none'">&times;</button>`;
                html += `<h2>${exerciseDetails.exercise_name}</h2>`;
                if (exerciseDetails.targets) html += `<p><strong>Targets:</strong> ${exerciseDetails.targets}</p>`;
                if (exerciseDetails.biomechanics) html += `<p><strong>Biomechanics:</strong> ${exerciseDetails.biomechanics}</p>`;
                if (exerciseDetails.how_to) html += `<p><strong>How-To:</strong> ${exerciseDetails.how_to}</p>`;
                if (exerciseDetails.cue) html += `<p><strong>Cue:</strong> "${exerciseDetails.cue}"</p>`;
                
                detailsContainer.innerHTML = html;
                detailsContainer.style.display = 'block';
            } else {
                detailsContainer.style.display = 'none';
            }
        }

        function calculate1RM(weight, reps) {
            if (reps === 1) return weight;
            return Math.round(weight * (36 / (37 - reps)));
        }

        function logWorkout() {
            const exercise = document.getElementById('exercise').value;
            const weight = parseFloat(document.getElementById('weight').value);
            const reps = parseInt(document.getElementById('reps').value);
            const editIndex = document.getElementById('edit-index').value;

            if (!exercise || isNaN(weight) || isNaN(reps)) {
                alert("Please fill all fields");
                return;
            }

            const est1RM = calculate1RM(weight, reps);
            const logs = JSON.parse(localStorage.getItem('workoutLogs')) || [];

            if (editIndex !== "") {
                const logToUpdate = logs[editIndex];
                logToUpdate.exercise = exercise;
                logToUpdate.weight = weight;
                logToUpdate.reps = reps;
                logToUpdate.est1RM = est1RM;
            } else {
                 const logEntry = {
                    date: new Date().toLocaleDateString(),
                    exercise: exercise,
                    weight: weight,
                    reps: reps,
                    est1RM: est1RM
                };
                logs.unshift(logEntry);
            }

            localStorage.setItem('workoutLogs', JSON.stringify(logs));
            resetForm();
            displayLogs();
        }

        function displayLogs() {
            const logs = JSON.parse(localStorage.getItem('workoutLogs')) || [];
            const container = document.getElementById('logContainer');
            let html = '';

            logs.forEach((log, index) => {
                html += `
                    <div class="log-entry">
                        <strong>${log.date} - <span style="color: #d4af37;">${log.exercise}</span></strong><br>
                        Lifted: ${log.weight} x ${log.reps} reps <br>
                        <span class="rm-highlight">Est. 1RM: ${log.est1RM}</span>
                        <div class="log-actions">
                            <button class="edit-button" onclick="editLog(${index})">Edit</button>
                            <button class="delete-button" onclick="deleteLog(${index})">Delete</button>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function editLog(index) {
            const logs = JSON.parse(localStorage.getItem('workoutLogs')) || [];
            const log = logs[index];

            document.getElementById('exercise').value = log.exercise;
            document.getElementById('weight').value = log.weight;
            document.getElementById('reps').value = log.reps;
            document.getElementById('edit-index').value = index;

            document.getElementById('form-title').textContent = 'Edit Set';
            const logButton = document.getElementById('log-button');
            logButton.textContent = 'Update Set';
            logButton.classList.add('is-editing');
            document.getElementById('cancel-button').style.display = 'block';
            window.scrollTo(0, 0);
        }

        function deleteLog(index) {
            if (!confirm('Are you sure you want to delete this log?')) return;
            const logs = JSON.parse(localStorage.getItem('workoutLogs')) || [];
            logs.splice(index, 1);
            localStorage.setItem('workoutLogs', JSON.stringify(logs));
            displayLogs();
        }

        function resetForm() {
            document.getElementById('exercise').value = '';
            document.getElementById('weight').value = '';
            document.getElementById('reps').value = '';
            document.getElementById('edit-index').value = '';

            document.getElementById('form-title').textContent = 'Log Set';
            const logButton = document.getElementById('log-button');
            logButton.textContent = 'Log Set';
            logButton.classList.remove('is-editing');
            document.getElementById('cancel-button').style.display = 'none';
        }
    </script>
</body>
</html>
