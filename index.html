<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Tracker</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="timer-container">
        <span id="timer-display">00:00</span>
        <button id="add-minute-timer-btn">+1 Minute</button>
        <button id="metronome-btn" title="Toggle Metronome">⏱️</button>
    </div>

    <div id="toast-notification"></div>

    <div id="exercise-details-modal" class="modal">
        <div class="modal-content">
            <span class="modal-close-button">&times;</span>
            <div id="details-header" class="modal-header">
                <h2 id="details-title" class="modal-title"></h2>
            </div>
            <div id="details-content"></div>
        </div>
    </div>

    <div id="progress-summary-modal" class="modal">
        <div class="modal-content">
            <span class="modal-close-button">&times;</span>
            <h2 id="summary-title"></h2>
            <div id="summary-content"></div>
        </div>
    </div>

    <div id="edit-log-container" class="card" style="display: none;">
        <h2>Edit Set</h2>
        <form id="edit-form">
            <label for="edit-exercise">Exercise:</label>
            <input type="text" id="edit-exercise" disabled style="background-color: #333;">
            
            <label for="edit-weight">Weight (lbs):</label>
            <input type="number" id="edit-weight" step="0.5">
            
            <label for="edit-reps">Reps:</label>
            <input type="number" id="edit-reps">
            
            <input type="hidden" id="edit-key">
            <button type="submit">Update Set</button>
            <button id="cancel-button" type="button">Cancel</button>
        </form>
    </div>

    <div class="card">
        <h2>Workout Routine</h2>
        <label for="routine-select">Workout Routine:</label>
        <select id="routine-select" disabled>
            <option value="loading">Loading routines...</option>
        </select>
        <div id="data-fetch-error" style="color: #ff4d4d; margin-top: 10px; display: none;"></div>
    </div>

    <div id="routine-form-container"></div>

    <div class="card">
        <h2>Recent Logs</h2>
        <div id="log-management-actions">
            <button id="import-csv-btn">Import CSV</button>
            <input type="file" id="csv-file-input" accept=".csv" style="display: none;">
            <button id="export-csv-btn">Export CSV</button>
        </div>
        <div id="logContainer"></div>
    </div>

    <script>
        let db;
        let workoutsData = [];
        let workoutDataMap = new Map();
        let toastTimeout;
        const DB_NAME = 'LiftTrackerDB';
        const DB_VERSION = 3;

        let timerInterval = null;
        let remainingTime = 0;
        let isTimerRunning = false;

        let audioContext;
        let isMetronomeOn = false;
        let metronomeInterval = null;

        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = event => {
                    const dbInstance = event.target.result;
                    if (!dbInstance.objectStoreNames.contains('workouts')) {
                        dbInstance.createObjectStore('workouts', { keyPath: 'routine_name' });
                    }
                    if (!dbInstance.objectStoreNames.contains('logs')) {
                        const logsStore = dbInstance.createObjectStore('logs', { keyPath: 'id', autoIncrement: true });
                        logsStore.createIndex('exercise', 'exercise', { unique: false });
                    }
                    if (!dbInstance.objectStoreNames.contains('prs')) {
                        dbInstance.createObjectStore('prs', { keyPath: 'exercise' });
                    }
                };
                request.onerror = event => { reject('Database error: ' + event.target.errorCode); };
                request.onsuccess = event => { db = event.target.result; resolve(db); };
            });
        }

        function processAndStoreWorkouts(data, fromNetwork = false) {
            workoutsData = data;
            workoutDataMap.clear();
            workoutsData.forEach(routine => workoutDataMap.set(routine.routine_name, routine.exercises));
            populateRoutines(workoutsData);

            if (fromNetwork) {
                const writeTransaction = db.transaction('workouts', 'readwrite');
                const writeStore = writeTransaction.objectStore('workouts');
                workoutsData.forEach(routine => writeStore.put(routine));
            }
        }

        function fetchWorkoutsFromNetwork() {
            const errorDiv = document.getElementById('data-fetch-error');
            errorDiv.style.display = 'none';
            fetch('workouts.json')
                .then(response => {
                    if (!response.ok) throw new Error(`Network response was not ok: ${response.statusText}`);
                    return response.json();
                })
                .then(data => {
                    processAndStoreWorkouts(data, true);
                })
                .catch(error => {
                    console.error('Failed to fetch workouts from network:', error);
                    const transaction = db.transaction('workouts', 'readonly');
                    const store = transaction.objectStore('workouts');
                    const getAllRequest = store.getAll();
                    
                    getAllRequest.onsuccess = () => {
                        if (getAllRequest.result && getAllRequest.result.length > 0) {
                            processAndStoreWorkouts(getAllRequest.result, false);
                        } else {
                            errorDiv.textContent = 'Error: Could not load workout routines. Please check your connection and refresh.';
                            errorDiv.style.display = 'block';
                        }
                    };
                    getAllRequest.onerror = () => {
                        errorDiv.textContent = 'Error: Could not load workout routines. Please check your connection and refresh.';
                        errorDiv.style.display = 'block';
                    };
                });
        }

        document.addEventListener('DOMContentLoaded', () => {
            initDB().then(() => {
                fetchWorkoutsFromNetwork(); 
                displayLogs();
            }).catch(error => {
                console.error('Failed to initialize database:', error);
                const errorDiv = document.getElementById('data-fetch-error');
                errorDiv.textContent = 'Critical Error: Application database could not be opened. Please try clearing site data.';
                errorDiv.style.display = 'block';
                document.getElementById('routine-select').disabled = true;
            });
            
            updateTimerDisplay();

            document.getElementById('add-minute-timer-btn').addEventListener('click', addMinuteToTimer);
            document.getElementById('metronome-btn').addEventListener('click', toggleMetronome);
            document.getElementById('routine-select').addEventListener('change', generateRoutineForm);
            document.getElementById('cancel-button').addEventListener('click', cancelEdit);
            document.getElementById('export-csv-btn').addEventListener('click', exportLogsToCSV);
            document.getElementById('import-csv-btn').addEventListener('click', () => document.getElementById('csv-file-input').click());
            document.getElementById('csv-file-input').addEventListener('change', importLogsFromCSV);

            document.getElementById('edit-form').addEventListener('submit', (event) => {
                event.preventDefault();
                updateLog();
            });
            document.getElementById('exercise-details-modal').addEventListener('click', (event) => {
                if (event.target.classList.contains('modal-close-button')) {
                    closeExerciseDetailsModal();
                }
            });
            document.getElementById('progress-summary-modal').addEventListener('click', (event) => {
                if (event.target.classList.contains('modal-close-button')) {
                    closeProgressSummaryModal();
                }
            });
            document.getElementById('routine-form-container').addEventListener('click', (event) => {
                const target = event.target;
                if (target.tagName === 'STRONG' && target.dataset.action === 'showDetails') {
                    showExerciseDetails(target.dataset.routine, target.dataset.exerciseIndex);
                }
                if (target.tagName === 'BUTTON' && target.dataset.action === 'logSet') {
                    logSet(target, target.dataset.exerciseIndex, target.dataset.setIndex, target.dataset.exerciseName);
                }
            });
            document.getElementById('logContainer').addEventListener('click', (event) => {
                const target = event.target;
                if (target.dataset.action === 'showSummary') {
                    showProgressSummary(target.dataset.exerciseName);
                } else if (target.dataset.action === 'editLog') {
                    editLog(target.dataset.key);
                } else if (target.dataset.action === 'deleteLog') {
                    deleteLog(target.dataset.key);
                }
            });
        });

        function playMetronomeTick() {
            if (!audioContext) return;
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.frequency.setValueAtTime(880, audioContext.currentTime);
            gainNode.gain.setValueAtTime(1, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + 0.05);

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.05);
        }

        function toggleMetronome() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }

            isMetronomeOn = !isMetronomeOn;
            const metronomeBtn = document.getElementById('metronome-btn');

            if (isMetronomeOn) {
                metronomeBtn.classList.add('metronome-on');
                playMetronomeTick(); 
                metronomeInterval = setInterval(playMetronomeTick, 1000); 
            } else {
                metronomeBtn.classList.remove('metronome-on');
                clearInterval(metronomeInterval);
                metronomeInterval = null;
            }
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(remainingTime / 60);
            const seconds = remainingTime % 60;
            document.getElementById('timer-display').textContent = 
                `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }
        
        function startTimerCountdown() {
            if (isTimerRunning) return;
            isTimerRunning = true;

            timerInterval = setInterval(() => {
                remainingTime--;
                updateTimerDisplay();

                if (remainingTime <= 0) {
                    clearInterval(timerInterval);
                    isTimerRunning = false;
                    remainingTime = 0;
                    updateTimerDisplay();
                    showToast("Rest period is over!");
                }
            }, 1000);
        }

        function addMinuteToTimer() {
            remainingTime += 60;
            updateTimerDisplay();
            if (!isTimerRunning && remainingTime > 0) {
                startTimerCountdown();
            }
        }

        function resetAndStartTimer(duration) {
            clearInterval(timerInterval);
            isTimerRunning = false;
            remainingTime = duration;
            updateTimerDisplay();
            startTimerCountdown();
        }

        function showToast(message) {
            const toast = document.getElementById('toast-notification');
            toast.textContent = message;
            toast.className = 'show';
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.className = toast.className.replace('show', '');
            }, 3000);
        }

        function populateRoutines(data) {
            const routineSelect = document.getElementById('routine-select');
            if (!routineSelect) return;
            
            routineSelect.innerHTML = '<option value="">Select Routine</option>';
            
            data.forEach(routine => {
                const option = document.createElement('option');
                option.value = routine.routine_name;
                option.textContent = routine.routine_name;
                routineSelect.appendChild(option);
            });

            routineSelect.disabled = false;
        }

        function generateRoutineForm() {
            const selectedRoutineName = document.getElementById('routine-select').value;
            const formContainer = document.getElementById('routine-form-container');
            formContainer.innerHTML = '';

            if (!selectedRoutineName) return;
            const exercises = workoutDataMap.get(selectedRoutineName);
            if (!exercises) return;

            const sections = { 'Warm-up': '', 'Lifts': '', 'Cool-down': '' };

            exercises.forEach((exercise, index) => {
                const sanitizedExerciseName = exercise.exercise_name.replace(/'/g, "\\'");
                const detailsAttr = `data-action="showDetails" data-routine="${selectedRoutineName}" data-exercise-index="${index}"`;
                
                if (exercise.category === 'Warm-up') {
                    sections['Warm-up'] += `<div class="warmup-entry"><strong ${detailsAttr}>${exercise.exercise_name}</strong></div>`;
                } else if (exercise.category === 'Main Lift' || exercise.category === 'Isolation Lift') {
                    let liftHtml = `<div class="log-entry"><strong ${detailsAttr}>${exercise.exercise_name}</strong>`;
                    const numSets = exercise.category === 'Main Lift' ? 3 : 1;

                    for (let i = 0; i < numSets; i++) {
                        const logBtnAttr = `data-action="logSet" data-exercise-index="${index}" data-set-index="${i}" data-exercise-name="${sanitizedExerciseName}"`;
                        liftHtml += `<div class="lift-form-row">
                                        <input type="number" id="weight-${index}-${i}" step="0.5" placeholder="Weight (lbs)">
                                        <input type="number" id="reps-${index}-${i}" placeholder="Reps">
                                        <button class="checkmark-btn" aria-label="Log Set" ${logBtnAttr}>&#10004;</button>
                                     </div>`;
                    }
                    liftHtml += `</div>`;
                    sections['Lifts'] += liftHtml;
                } else if (exercise.category === 'Cool-down') {
                    sections['Cool-down'] += `<div class="warmup-entry"><strong ${detailsAttr}>${exercise.exercise_name}</strong></div>`;
                }
            });

            let finalHtml = '';
            if (sections['Warm-up']) finalHtml += `<div class="warmup-section">${sections['Warm-up']}</div>`;
            if (sections['Lifts']) finalHtml += `<div class="lifts-section">${sections['Lifts']}</div>`;
            if (sections['Cool-down']) finalHtml += `<div class="cooldown-section">${sections['Cool-down']}</div>`;
            formContainer.innerHTML = finalHtml;
        }
        
        async function logSet(buttonElement, exerciseIndex, setIndex, exerciseName) {
            const weightInput = document.getElementById(`weight-${exerciseIndex}-${setIndex}`);
            const repsInput = document.getElementById(`reps-${exerciseIndex}-${setIndex}`);
            if (!weightInput || !repsInput) return;

            const weight = parseFloat(weightInput.value);
            const reps = parseInt(repsInput.value);

            if (!exerciseName || isNaN(weight) || isNaN(reps) || weight <= 0 || reps <= 0) {
                showToast("Please enter valid weight and reps for the set.");
                return;
            }

            const est1RM = calculate1RM(weight, reps);
            const transaction = db.transaction(['logs', 'prs'], 'readwrite');
            const logsStore = transaction.objectStore('logs');
            const prsStore = transaction.objectStore('prs');

            const prRequest = prsStore.get(exerciseName);
            prRequest.onsuccess = () => {
                const currentPR = prRequest.result ? prRequest.result.est1RM : 0;
                let isNewPR = false;

                if (est1RM > currentPR) {
                    isNewPR = true;
                    prsStore.put({ exercise: exerciseName, est1RM: est1RM });
                }

                const logEntry = { timestamp: Date.now(), date: new Date().toLocaleDateString(), exercise: exerciseName, weight: weight, reps: reps, est1RM: est1RM, isPR: isNewPR };
                const addRequest = logsStore.add(logEntry);
                addRequest.onsuccess = () => {
                    displayLogs();
                    let toastMessage = `Set logged!`;
                    if (isNewPR) toastMessage += " ✨ New PR!";
                    showToast(toastMessage);
                    resetAndStartTimer(60);
                    weightInput.disabled = true;
                    repsInput.disabled = true;
                    weightInput.style.backgroundColor = "#222";
                    repsInput.style.backgroundColor = "#222";
                    buttonElement.disabled = true;
                };
                addRequest.onerror = () => showToast('Error logging set.');
            };

            prRequest.onerror = () => {
                showToast('Error checking for PR, but logging set.');
                const logEntry = { timestamp: Date.now(), date: new Date().toLocaleDateString(), exercise: exerciseName, weight: weight, reps: reps, est1RM: est1RM, isPR: false };
                logsStore.add(logEntry).onsuccess = () => displayLogs();
            };
        }
        
        function showExerciseDetails(routineName, exerciseIndex) {
            const exercises = workoutDataMap.get(routineName);
            const exercise = exercises ? exercises[exerciseIndex] : null;
            if (!exercise) return;

            const titleEl = document.getElementById('details-title');
            titleEl.innerHTML = `${exercise.exercise_name} <span class="modal-category">(${exercise.category})</span>`;

            const contentEl = document.getElementById('details-content');
            const targetsHtml = exercise.targets.map(t => `<div>${t}</div>`).join('');
            const howToHtml = `<ol><li>${exercise.how_to.join('</li><li>')}</li></ol>`;

            contentEl.innerHTML = `
                <div class="modal-section"><span class="modal-section-title">Targets:</span><div class="modal-section-content">${targetsHtml}</div></div>
                <div class="modal-section"><span class="modal-section-title">Biomechanics:</span><div class="modal-section-content">${exercise.biomechanics}</div></div>
                <div class="modal-section"><span class="modal-section-title">How To:</span><div class="modal-section-content">${howToHtml}</div></div>
                <div id="modal-history-section" class="modal-section" style="display: none;">
                    <span class="modal-section-title">Personal Records & History:</span>
                    <div class="modal-section-content" id="modal-history-content"></div>
                </div>`;

            document.getElementById('exercise-details-modal').style.display = 'block';

            const transaction = db.transaction('logs', 'readonly');
            const store = transaction.objectStore('logs');
            const index = store.index('exercise');
            const getLogsRequest = index.getAll(exercise.exercise_name);

            getLogsRequest.onsuccess = () => {
                const logs = getLogsRequest.result;
                if (logs && logs.length > 0) {
                    logs.sort((a, b) => b.timestamp - a.timestamp);
                    const latest = logs[0];
                    const best = logs.reduce((prev, current) => (prev.est1RM > current.est1RM) ? prev : current);
                    
                    const historyContainer = document.getElementById('modal-history-section');
                    const historyContent = document.getElementById('modal-history-content');
                    
                    historyContent.innerHTML = `
                        <div style="margin-bottom: 8px;"><strong>All-Time Best (PR):</strong> ${best.weight} lbs x ${best.reps} reps (Est. 1RM: <span class="rm-highlight">${best.est1RM}</span>) on ${best.date}</div>
                        <div><strong>Most Recent Session:</strong> ${latest.weight} lbs x ${latest.reps} reps (Est. 1RM: <span class="rm-highlight">${latest.est1RM}</span>) on ${latest.date}</div>`;
                    historyContainer.style.display = 'block';
                }
            };
        }

        function closeExerciseDetailsModal() { document.getElementById('exercise-details-modal').style.display = 'none'; }
        function calculate1RM(weight, reps) { return reps === 1 ? weight : Math.round(weight * (1 + reps / 30)); }

        function displayLogs() {
            const transaction = db.transaction('logs', 'readonly');
            const store = transaction.objectStore('logs');
            const getAllRequest = store.getAll();

            getAllRequest.onsuccess = () => {
                const allLogs = getAllRequest.result;
                const container = document.getElementById('logContainer');

                if (allLogs.length === 0) {
                    container.innerHTML = "No sets logged yet.";
                    return;
                }

                const sortedLogs = allLogs.sort((a, b) => b.timestamp - a.timestamp);
                
                container.innerHTML = sortedLogs.slice(0, 50).map(log => {
                    const safeExerciseName = log.exercise.replace(/'/g, "\\'");
                    const prBadge = log.isPR ? `<span class="pr-badge">✨ PR!</span>` : '';
                    return `
                    <div class="log-entry">
                        <strong>${log.date} - <span style="color: #d4af37; cursor: pointer;" data-action="showSummary" data-exercise-name="${safeExerciseName}">${log.exercise}</span></strong><br>
                        Lifted: ${log.weight} x ${log.reps} reps <br>
                        <span class="rm-highlight">Est. 1RM: ${log.est1RM}</span> ${prBadge}
                        <div class="log-actions">
                            <button class="edit-button" data-action="editLog" data-key="${log.id}">Edit</button>
                            <button class="delete-button" data-action="deleteLog" data-key="${log.id}">Delete</button>
                        </div>
                    </div>`;
                }).join('');
            };
        }

        function deleteLog(key) {
            if (!confirm('Are you sure you want to delete this log?')) return;
            const keyNum = parseInt(key, 10);
            
            const transaction = db.transaction(['logs', 'prs'], 'readwrite');
            const logsStore = transaction.objectStore('logs');
            const getRequest = logsStore.get(keyNum);

            getRequest.onsuccess = () => {
                const logToDelete = getRequest.result;
                if (logToDelete) {
                    logsStore.delete(keyNum).onsuccess = () => {
                        recalculatePRs(logToDelete.exercise).then(() => {
                            displayLogs();
                            showToast('Log deleted.');
                        });
                    };
                }
            };
        }

        function editLog(key) {
            const keyNum = parseInt(key, 10);
            const transaction = db.transaction('logs', 'readonly');
            const store = transaction.objectStore('logs');
            const getRequest = store.get(keyNum);
            getRequest.onsuccess = () => {
                const log = getRequest.result;
                document.getElementById('edit-exercise').value = log.exercise;
                document.getElementById('edit-weight').value = log.weight;
                document.getElementById('edit-reps').value = log.reps;
                document.getElementById('edit-key').value = log.id;
                document.getElementById('edit-log-container').style.display = 'block';
                window.scrollTo(0, 0);
            };
        }

        function cancelEdit() { document.getElementById('edit-log-container').style.display = 'none'; }

        function updateLog() {
            const weight = parseFloat(document.getElementById('edit-weight').value);
            const reps = parseInt(document.getElementById('edit-reps').value);
            const key = parseInt(document.getElementById('edit-key').value, 10);
            if (isNaN(weight) || isNaN(reps) || weight <= 0 || reps <= 0) { showToast("Please enter valid weight and reps."); return; }
            
            const transaction = db.transaction('logs', 'readwrite');
            const logsStore = transaction.objectStore('logs');
            const getRequest = logsStore.get(key);

            getRequest.onsuccess = () => {
                const logToUpdate = getRequest.result;
                const exerciseName = logToUpdate.exercise;
                
                logToUpdate.weight = weight;
                logToUpdate.reps = reps;
                logToUpdate.est1RM = calculate1RM(weight, reps);
                logToUpdate.date = new Date().toLocaleDateString() + " (edited)";
                logToUpdate.timestamp = Date.now();
                logToUpdate.isPR = false;

                logsStore.put(logToUpdate).onsuccess = () => {
                    recalculatePRs(exerciseName).then(() => {
                        displayLogs();
                        cancelEdit();
                        showToast('Set updated successfully!');
                    });
                };
            };
        }
    
        function recalculatePRs(exerciseName) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(['logs', 'prs'], 'readwrite');
                const logsStore = transaction.objectStore('logs');
                const prsStore = transaction.objectStore('prs');
                const exerciseIndex = logsStore.index('exercise');

                const getLogsRequest = exerciseIndex.getAll(exerciseName);

                getLogsRequest.onsuccess = () => {
                    const logs = getLogsRequest.result;
                    let overallBestLog = null;
                    
                    if (logs && logs.length > 0) {
                        overallBestLog = logs.reduce((best, current) => current.est1RM > best.est1RM ? current : best);
                        
                        prsStore.put({ exercise: exerciseName, est1RM: overallBestLog.est1RM });

                        logs.forEach(log => {
                            const wasPR = log.isPR;
                            const isNowPR = (log.id === overallBestLog.id);
                            if (wasPR !== isNowPR) {
                                log.isPR = isNowPR;
                                logsStore.put(log);
                            }
                        });
                    } else {
                        prsStore.delete(exerciseName);
                    }
                };
                
                transaction.oncomplete = () => resolve();
                transaction.onerror = (event) => reject('PR recalculation failed: ' + event.target.errorCode);
            });
        }

        function showProgressSummary(exerciseName) {
            const transaction = db.transaction('logs', 'readonly');
            const store = transaction.objectStore('logs');
            const index = store.index('exercise');
            const getAllRequest = index.getAll(exerciseName);

            getAllRequest.onsuccess = () => {
                const logs = getAllRequest.result;
                if (logs.length < 1) { showToast("No data available for this exercise."); return; }

                logs.sort((a, b) => a.timestamp - b.timestamp);

                const bestSet = logs.reduce((prev, current) => (prev.est1RM > current.est1RM) ? prev : current);
                const firstSet = logs[0];
                const latestSet = logs[logs.length - 1];

                const improvement = firstSet.est1RM > 0 
                    ? ((bestSet.est1RM - firstSet.est1RM) / firstSet.est1RM * 100).toFixed(1)
                    : 0;

                document.getElementById('summary-title').textContent = `${exerciseName} Progress`;
                const contentEl = document.getElementById('summary-content');
                contentEl.innerHTML = `
                    <div class="summary-section">
                        <strong>Best vs. Latest (Est. 1RM)</strong><br>
                        All-Time Best: <span class="rm-highlight">${bestSet.est1RM}</span><br>
                        Most Recent: <span class="rm-highlight">${latestSet.est1RM}</span>
                    </div>
                    <div class="summary-section">
                        <strong>Set Details</strong><br>
                        <small>Best: ${bestSet.weight} lbs x ${bestSet.reps} reps (on ${bestSet.date})</small><br>
                        <small>Latest: ${latestSet.weight} lbs x ${latestSet.reps} reps (on ${latestSet.date})</small>
                    </div>
                     <div class="summary-section">
                        <strong>Journey</strong><br>
                        <small>Started at: ${firstSet.est1RM} (on ${firstSet.date})</small><br>
                        <strong>Total Improvement:</strong> ${improvement >= 0 ? `+${improvement}` : improvement}%
                    </div>
                `;
                document.getElementById('progress-summary-modal').style.display = 'block';
            };
            getAllRequest.onerror = () => {
                showToast("Could not retrieve progress data.");
            }
        }

        function closeProgressSummaryModal() { document.getElementById('progress-summary-modal').style.display = 'none'; }
        
        function exportLogsToCSV() {
            const transaction = db.transaction('logs', 'readonly');
            const store = transaction.objectStore('logs');
            const getAllRequest = store.getAll();

            getAllRequest.onsuccess = () => {
                const logs = getAllRequest.result;
                if (logs.length === 0) {
                    showToast("No logs to export.");
                    return;
                }

                const headers = ['timestamp', 'date', 'exercise', 'weight', 'reps', 'est1RM', 'isPR'];
                const csvRows = [headers.join(',')];
                
                logs.forEach(log => {
                    const values = headers.map(header => {
                        const escaped = ('' + log[header]).replace(/"/g, '\\"');
                        return `"${escaped}"`;
                    });
                    csvRows.push(values.join(','));
                });

                const csvString = csvRows.join('\n');
                const blob = new Blob([csvString], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.setAttribute('href', url);
                a.setAttribute('download', `lift-tracker-logs-${new Date().toISOString().slice(0, 10)}.csv`);
                a.click();
                showToast("Logs exported successfully.");
            };
            getAllRequest.onerror = () => showToast("Error exporting logs.");
        }

        function importLogsFromCSV(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                const text = e.target.result;
                const rows = text.split('\n').slice(1);
                if (rows.length === 0) {
                    showToast("CSV file is empty or invalid.");
                    return;
                }

                const transaction = db.transaction(['logs', 'prs'], 'readwrite');
                const logsStore = transaction.objectStore('logs');
                let importedCount = 0;

                rows.forEach(row => {
                    if (row.trim() === '') return;
                    const values = row.split(',').map(v => v.trim().replace(/"/g, ''));
                    const log = {
                        timestamp: parseInt(values[0], 10),
                        date: values[1],
                        exercise: values[2],
                        weight: parseFloat(values[3]),
                        reps: parseInt(values[4], 10),
                        est1RM: parseInt(values[5], 10),
                        isPR: values[6] === 'true'
                    };

                    if (!isNaN(log.timestamp) && log.exercise && !isNaN(log.weight) && !isNaN(log.reps)) {
                        logsStore.add(log);
                        importedCount++;
                    }
                });

                transaction.oncomplete = () => {
                    showToast(`${importedCount} logs imported successfully!`);
                    displayLogs();
                    const allExerciseNames = [...new Set(rows.map(row => row.split(',')[2].trim().replace(/"/g, '')))];
                    allExerciseNames.forEach(recalculatePRs);
                };
                transaction.onerror = () => showToast("Error importing logs.");
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js'); }); }
    </script>
