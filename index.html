<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Log</title>
    <!-- Links to your PWA manifest for "Add to Homescreen" functionality -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="https://img.icons8.com/color/192/000000/barbell.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .check-anim { transition: all 0.2s ease-in-out; }
    </style>
</head>
<body class="bg-black text-gray-100 min-h-screen p-4 font-sans">
    <div class="max-w-md mx-auto">
        
        <!-- Header -->
        <header class="flex justify-between items-center mb-4 border-b border-zinc-800 pb-3">
            <h1 class="text-2xl font-bold text-yellow-500">⚡ Gym Log</h1>
            <div class="flex gap-2">
                <input type="file" id="restoreInput" accept=".json" class="hidden">
                <button id="loadButton" class="bg-zinc-900 text-xs px-3 py-1.5 rounded border border-zinc-700 hover:border-yellow-500/50 text-gray-300 transition font-bold">Load</button>
                <button id="saveButton" class="bg-yellow-500/10 text-xs px-3 py-1.5 rounded border border-yellow-500/50 hover:bg-yellow-500/20 text-yellow-500 transition font-bold">Save Backup</button>
            </div>
        </header>

        <!-- Navigation Tabs -->
        <nav class="flex gap-1 mb-6 border-b border-zinc-800 pb-2 text-sm">
            <button data-view="track" id="tab-track" class="nav-tab flex-1 font-bold pb-2 border-b-2">Track</button>
            <button data-view="history" id="tab-history" class="nav-tab flex-1 font-bold pb-2 border-b-2">History</button>
            <button data-view="progress" id="tab-progress" class="nav-tab flex-1 font-bold pb-2 border-b-2">Progress</button>
            <button data-view="routines" id="tab-routines" class="nav-tab flex-1 font-bold pb-2 border-b-2">Plans</button>
        </nav>
        
        <!-- Sticky Timer -->
        <div class="sticky top-4 z-50 bg-zinc-900/80 backdrop-blur-sm p-2.5 rounded-xl border border-zinc-800 mb-6 flex justify-between items-center gap-4 flex-wrap">
            <div id="timerDisplay" class="text-3xl font-mono font-black text-yellow-500">01:00</div>
            <div class="flex gap-2 items-center">
                <button id="addTimeBtn" class="bg-yellow-500/10 hover:bg-yellow-500/20 text-yellow-500 border border-yellow-500/30 font-bold w-12 h-10 rounded-lg text-sm transition">+1m</button>
                <button id="resetTimerBtn" class="bg-zinc-800 hover:bg-zinc-700 font-bold w-12 h-10 rounded-lg border border-zinc-700 transition text-xs">Reset</button>
                <button id="metronomeBtn" class="bg-zinc-800 border border-zinc-700 text-gray-400 w-12 h-10 rounded-lg hover:text-yellow-500 transition font-bold text-xl">🎵</button>
            </div>
        </div>

        <!-- VIEWS CONTAINER -->
        <main>
            <div id="view-track" class="view-container">
                <div class="bg-zinc-900 p-4 rounded-xl border border-zinc-800 mb-6">
                    <div class="flex justify-between items-center mb-3">
                        <h2 class="text-lg font-bold text-gray-200">Today's Workout</h2>
                        <div class="flex items-center gap-1.5">
                            <input type="checkbox" id="autoTimer" checked class="accent-yellow-500 h-3 w-3">
                            <label for="autoTimer" class="text-xs text-gray-400">Auto-Timer</label>
                        </div>
                    </div>
                    <select id="activeRoutineSelect" class="w-full bg-zinc-950 border border-zinc-700 text-yellow-500 font-semibold rounded p-2 mb-4 focus:outline-none focus:border-yellow-500 transition"></select>
                    <div id="routineChecklist" class="space-y-4 hidden"></div>
                    <div id="customSetContainer">
                        <div class="flex items-center gap-2 my-4">
                            <div class="h-px bg-zinc-800 flex-1"></div>
                            <span class="text-xs text-zinc-500 font-bold tracking-widest uppercase">Custom Set</span>
                            <div class="h-px bg-zinc-800 flex-1"></div>
                        </div>
                        <div class="space-y-3">
                            <input id="exercise" type="text" placeholder="Exercise Name" class="w-full bg-zinc-800 border border-zinc-700 rounded p-2 text-white text-sm focus:outline-none focus:border-yellow-500 transition">
                            <div class="grid grid-cols-2 gap-3">
                                <input id="weight" type="number" placeholder="Weight (lbs)" class="bg-zinc-800 border border-zinc-700 rounded p-2 text-white text-sm focus:outline-none focus:border-yellow-500 transition">
                                <input id="reps" type="number" placeholder="Reps" class="bg-zinc-800 border border-zinc-700 rounded p-2 text-white text-sm focus:outline-none focus:border-yellow-500 transition">
                            </div>
                            <button id="logCustomSetBtn" class="w-full bg-zinc-800 hover:bg-zinc-700 text-yellow-500 border border-zinc-700 font-bold p-2.5 rounded-lg transition">Log Custom Set</button>
                        </div>
                    </div>
                </div>
                <div class="bg-zinc-900 p-4 rounded-xl border border-zinc-800">
                    <h2 class="text-lg font-bold text-gray-200 mb-3">Completed Log</h2>
                    <div id="logList" class="space-y-2"></div>
                </div>
            </div>

            <div id="view-history" class="view-container hidden">
                <div class="bg-zinc-900 p-4 rounded-xl border border-zinc-800">
                    <h2 class="text-lg font-bold text-gray-200 mb-4">Past Workouts</h2>
                    <div id="historyList" class="space-y-6"></div>
                </div>
            </div>

            <div id="view-progress" class="view-container hidden">
                <div class="bg-zinc-900 p-4 rounded-xl border border-zinc-800">
                    <h2 class="text-lg font-bold text-gray-200 mb-4">Strength Progress</h2>
                    <p class="text-sm text-gray-400 mb-3">Select an exercise to view your max weight and estimated 1RM.</p>
                    <select id="exerciseSelect" class="w-full bg-zinc-800 border border-zinc-700 rounded p-2.5 text-white mb-6 focus:outline-none focus:border-yellow-500"></select>
                    <div class="w-full bg-black p-2 rounded-lg border border-zinc-800">
                        <canvas id="progressChart"></canvas>
                    </div>
                </div>
            </div>

            <div id="view-routines" class="view-container hidden">
                <div class="bg-zinc-900 p-4 rounded-xl border border-zinc-800 mb-6">
                    <h2 class="text-lg font-bold text-gray-200 mb-3">Template Builder</h2>
                    <div class="space-y-4">
                        <input id="routineName" type="text" placeholder="Template Name (e.g. Chest Day)" class="w-full bg-zinc-800 border border-zinc-700 rounded p-2.5 text-white placeholder-gray-500 focus:outline-none focus:border-yellow-500 transition">
                        <textarea id="warmupInput" placeholder="Warm-up: enter one item per line..." rows="3" class="w-full bg-zinc-800 border border-zinc-700 rounded p-2 text-white placeholder-gray-500 text-sm focus:outline-none focus:border-yellow-500 transition"></textarea>
                        <div id="exerciseRowsContainer" class="space-y-3 pt-2 border-t border-zinc-800"></div>
                        <button id="addExerciseRowBtn" class="w-full bg-zinc-800 hover:bg-zinc-700 text-yellow-500 border border-zinc-700 font-bold p-2.5 rounded-lg transition">+ Add Exercise Step</button>
                        <textarea id="cooldownInput" placeholder="Cool-down: enter one item per line..." rows="3" class="w-full bg-zinc-800 border border-zinc-700 rounded p-2 text-white placeholder-gray-500 text-sm focus:outline-none focus:border-yellow-500 transition"></textarea>
                        <button id="saveRoutineBtn" class="w-full bg-yellow-500/10 hover:bg-yellow-500/20 text-yellow-500 border border-yellow-500/50 font-bold p-3 rounded-lg transition mt-4 shadow-sm">Save Template</button>
                    </div>
                </div>
                <div class="bg-zinc-900 p-4 rounded-xl border border-zinc-800">
                    <h2 class="text-lg font-bold text-gray-200 mb-4">Saved Templates</h2>
                    <div id="routineList" class="space-y-4"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- HTML Template for Routine Builder Dynamic Rows -->
    <template id="exerciseRowTemplate">
        <div class="flex items-start gap-2 bg-zinc-950 p-2.5 rounded-lg border border-zinc-800 shadow-inner">
            <div class="flex-1 space-y-2">
                <input type="text" placeholder="Exercise (e.g. Side Lunge)" class="ex-name w-full bg-zinc-800 border border-zinc-700 rounded p-2 text-white text-sm focus:outline-none focus:border-yellow-500">
                <div class="flex gap-2">
                    <select class="ex-type w-1/3 bg-zinc-800 border border-zinc-700 rounded p-2 text-white text-xs focus:outline-none focus:border-yellow-500">
                        <option value="warm-up">warm-up</option>
                        <option value="ramp">ramp</option>
                        <option value="working" selected>working</option>
                        <option value="isolation">isolation</option>
                    </select>
                    <input type="number" placeholder="%1RM" class="ex-pct w-1/3 bg-zinc-800 border border-zinc-700 rounded p-2 text-white text-sm focus:outline-none focus:border-yellow-500">
                    <input type="text" placeholder="Reps/AMRAP" class="ex-reps w-1/3 bg-zinc-800 border border-zinc-700 rounded p-2 text-white text-sm focus:outline-none focus:border-yellow-500">
                </div>
            </div>
            <button class="remove-row-btn text-red-400 hover:text-red-500 font-bold px-2 py-2 mt-1 rounded hover:bg-red-500/10 transition">✕</button>
        </div>
    </template>
    
    <script>
    // Self-invoking function to prevent global scope pollution
    (function() {
        // --- SERVICE WORKER REGISTRATION ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                  .then(reg => console.log('Service Worker registered successfully.'))
                  .catch(err => console.warn('Service Worker registration failed:', err));
            });
        }

        // STATE MANAGEMENT
        let workoutLogs = [];
        let workoutRoutines = [];
        let timerInstance = null;
        let defaultSeconds = 60;
        let currentSecondsRemaining = defaultSeconds;
        let metronomeInterval = null;
        let metronomeAudioCtx = null;
        let progressChart = null;
        let wakeLock = null; // Used for Screen Wake API

        // DOM ELEMENTS MAP
        const DOMElements = {
            restoreInput: document.getElementById('restoreInput'),
            loadButton: document.getElementById('loadButton'),
            saveButton: document.getElementById('saveButton'),
            navTabs: document.querySelectorAll('.nav-tab'),
            views: document.querySelectorAll('.view-container'),
            timerDisplay: document.getElementById('timerDisplay'),
            addTimeBtn: document.getElementById('addTimeBtn'),
            resetTimerBtn: document.getElementById('resetTimerBtn'),
            metronomeBtn: document.getElementById('metronomeBtn'),
            autoTimerCheck: document.getElementById('autoTimer'),
            activeRoutineSelect: document.getElementById('activeRoutineSelect'),
            routineChecklist: document.getElementById('routineChecklist'),
            logCustomSetBtn: document.getElementById('logCustomSetBtn'),
            logList: document.getElementById('logList'),
            historyList: document.getElementById('historyList'),
            exerciseSelect: document.getElementById('exerciseSelect'),
            progressChartCtx: document.getElementById('progressChart').getContext('2d'),
            routineName: document.getElementById('routineName'),
            warmupInput: document.getElementById('warmupInput'),
            cooldownInput: document.getElementById('cooldownInput'),
            exerciseRowsContainer: document.getElementById('exerciseRowsContainer'),
            addExerciseRowBtn: document.getElementById('addExerciseRowBtn'),
            saveRoutineBtn: document.getElementById('saveRoutineBtn'),
            routineList: document.getElementById('routineList'),
            custom: {
                exercise: document.getElementById('exercise'),
                weight: document.getElementById('weight'),
                reps: document.getElementById('reps')
            }
        };

        // --- WAKE LOCK API ---
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log('Screen Wake Lock acquired');
                }
            } catch (err) {
                console.warn(`Wake Lock error: ${err.name}, ${err.message}`);
            }
        }

        function releaseWakeLock() {
            if (wakeLock !== null) {
                wakeLock.release().then(() => {
                    wakeLock = null;
                    console.log('Screen Wake Lock released');
                });
            }
        }

        // --- DATA & PERSISTENCE ---
        const getISODate = () => new Date().toISOString().slice(0, 10); // Standardized YYYY-MM-DD

        function loadData() {
            workoutLogs = JSON.parse(localStorage.getItem('workoutLogs')) || [];
            
            // FULL LIST OF ALL 9 ORIGINAL ROUTINES RESTORED

                    id: 1, 
                    name: "1. Side Lunge & Adduction",

                        { name: "Side Lunge", type: "ramp", pct: 66, reps: "6" }, 
                        { name: "Side Lunge", type: "working", pct: 80, reps: "amrap" }, 
                        { name: "Hip Adduction", type: "isolation", pct: 75, reps: "amrap" },

                    ], 
                    cooldowns: ["Butterfly Stretch (30s)", "Standing Calf Stretch (30s per side)"] 
                },
                { 
                    id: 2, 
                    name: "2. 30-deg Incline Press",

                    exercises: [ 
                        { name: "30-degree Incline Press", type: "warm-up", pct: 33, reps: "6" }, 
                        { name: "30-degree Incline Press", type: "ramp", pct: 66, reps: "6" }, 
                        { name: "30-degree Incline Press", type: "working", pct: 80, reps: "amrap" }, 
                        { name: "Incline Fly", type: "isolation", pct: 75, reps: "amrap" }, 
                        { name: "Front Raise", type: "isolation", pct: 75, reps: "amrap" }, 
                        { name: "Tricep Extension", type: "isolation", pct: 75, reps: "amrap" } 
                    ], 
                    cooldowns: ["Doorway Chest Stretch (30s)", "Overhead Tricep Stretch (30s per side)"] 
                },
                { 
                    id: 3, 
                    name: "3. Walking Lunge & Back Ext", 
                    warmups: ["Cat-Cow (10 cycles)", "Glute Bridges (15 reps)"], 
                    exercises: [ 
                        { name: "Walking Lunge", type: "warm-up", pct: 33, reps: "6" }, 
                        { name: "Walking Lunge", type: "ramp", pct: 66, reps: "6" }, 
                        { name: "Walking Lunge", type: "working", pct: 80, reps: "amrap" }, 
                        { name: "Back Extension", type: "isolation", pct: 75, reps: "amrap" } 
                    ],

                },
                { 
                    id: 4,

                    exercises: [ 
                        { name: "Bent-Over Row", type: "warm-up", pct: 33, reps: "6" }, 
                        { name: "Bent-Over Row", type: "ramp", pct: 66, reps: "6" }, 
                        { name: "Bent-Over Row", type: "working", pct: 80, reps: "amrap" },

                        { name: "Incline Curl", type: "isolation", pct: 75, reps: "amrap" } 
                    ],

                },
                { 
                    id: 5, 
                    name: "5. Curtsy Lunge & Abduction", 
                    warmups: ["Fire Hydrants (15 each side)", "Lateral Band Walks (10 each side)"], 
                    exercises: [ 
                        { name: "Curtsy Lunge", type: "warm-up", pct: 33, reps: "6" }, 
                        { name: "Curtsy Lunge", type: "ramp", pct: 66, reps: "6" }, 
                        { name: "Curtsy Lunge", type: "working", pct: 80, reps: "amrap" }, 
                        { name: "Hip Abduction", type: "isolation", pct: 75, reps: "amrap" }, 
                        { name: "Calf Raise", type: "isolation", pct: 75, reps: "amrap" }

                    cooldowns: ["Pigeon Pose (30s per side)", "Figure-Four Stretch (30s per side)"] 
                },
                { 
                    id: 6, 
                    name: "6. Arnold Press",

                        { name: "Arnold Press", type: "ramp", pct: 66, reps: "6" },

                        { name: "Lateral Raise", type: "isolation", pct: 75, reps: "amrap" }, 
                        { name: "Reverse Fly", type: "isolation", pct: 75, reps: "amrap" }, 
                        { name: "Tricep Extension", type: "isolation", pct: 75, reps: "amrap" } 
                    ], 
                    cooldowns: ["Cross-Body Shoulder Stretch (30s per side)", "Overhead Tricep Stretch (30s per side)"] 
                },
                { 
                    id: 7, 
                    name: "7. Romanian Deadlift", 
                    warmups: ["Cat-Cow (10 cycles)", "Good Mornings (Bodyweight, 12 reps)"], 
                    exercises: [ 
                        { name: "Romanian Deadlift", type: "warm-up", pct: 33, reps: "6" }, 
                        { name: "Romanian Deadlift", type: "ramp", pct: 66, reps: "6" }, 
                        { name: "Romanian Deadlift", type: "working", pct: 80, reps: "amrap" }, 
                        { name: "Back Extension", type: "isolation", pct: 75, reps: "amrap" } 
                    ], 
                    cooldowns: ["Lying Hamstring Stretch (30s per side)", "Child's Pose (60s)"] 
                },
                { 
                    id: 8, 
                    name: "8. Pull-Up", 
                    warmups: ["Scapular Pull-ups (10 reps)", "Dead Hang (20s)"], 
                    exercises: [ 
                        { name: "Pull-Up", type: "warm-up", pct: 33, reps: "6" }, 
                        { name: "Pull-Up", type: "ramp", pct: 66, reps: "6" }, 
                        { name: "Pull-Up", type: "working", pct: 80, reps: "amrap" }, 
                        { name: "Straight-Arm Pulldown", type: "isolation", pct: 75, reps: "amrap" }, 
                        { name: "Incline Curl", type: "isolation", pct: 75, reps: "amrap" } 
                    ], 
                    cooldowns: ["Doorway Lat Stretch (30s per side)", "Bicep Wall Stretch (30s per side)"] 
                },
                { 
                    id: 9, 
                    name: "9. Lat Pulldown", 
                    warmups: ["Scapular Retractions (15 reps)", "Light Band Pulldowns (15 reps)"], 
                    exercises: [ 
                        { name: "Lat Pulldown", type: "warm-up", pct: 33, reps: "6" }, 
                        { name: "Lat Pulldown", type: "ramp", pct: 66, reps: "6" }, 
                        { name: "Lat Pulldown", type: "working", pct: 80, reps: "amrap" }, 
                        { name: "Straight-Arm Pulldown", type: "isolation", pct: 75, reps: "amrap" }, 
                        { name: "Incline Curl", type: "isolation", pct: 75, reps: "amrap" } 
                    ], 
                    cooldowns: ["Doorway Lat Stretch (30s per side)", "Bicep Wall Stretch (30s per side)"] 
                }
            ];
            workoutRoutines = JSON.parse(localStorage.getItem('workoutRoutines')) || defaultRoutines;
        }

        function saveData() {
            try {
                localStorage.setItem('workoutLogs', JSON.stringify(workoutLogs));
                localStorage.setItem('workoutRoutines', JSON.stringify(workoutRoutines));
            } catch (error) {
                if (error.name === 'QuotaExceededError' || error.name === 'NS_ERROR_DOM_QUOTA_REACHED') {
                    alert("⚠️ Browser storage is full! Please click 'Save Backup' to download your history, then clear some old history items.");
                } else {
                    console.error("Storage failed:", error);
                }
            }
        }

        function backupData() {
            const payload = { logs: workoutLogs, routines: workoutRoutines };
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(payload, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", `gym-log-backup-${getISODate()}.json`);
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        function restoreBackup(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    let logsValid = false, routinesValid = false;

                    if (importedData.logs && Array.isArray(importedData.logs)) {
                        workoutLogs = importedData.logs;
                        logsValid = true;
                    }
                    if (importedData.routines && Array.isArray(importedData.routines)) {
                        workoutRoutines = importedData.routines;
                        routinesValid = true;
                    }

                    if (!logsValid && !routinesValid) {
                        if (Array.isArray(importedData)) {
                             workoutLogs = importedData;
                        } else {
                            throw new Error("Format mismatch");
                        }
                    }
                    
                    saveData();
                    fullRender();
                    alert("Backup loaded successfully!");
                } catch (err) {
                    alert("Error: Could not read backup file format.");
                    console.error(err);
                } finally {
                    event.target.value = ''; // Reset input
                }
            };
            reader.readAsText(file);
        }

        // --- NAVIGATION ---
        function switchView(targetView) {
            DOMElements.views.forEach(view => {
                view.classList.toggle('hidden', view.id !== `view-${targetView}`);
            });
            DOMElements.navTabs.forEach(tab => {
                const isTarget = tab.dataset.view === targetView;
                tab.classList.toggle('border-yellow-500', isTarget);
                tab.classList.toggle('text-yellow-500', isTarget);
                tab.classList.toggle('border-transparent', !isTarget);
                tab.classList.toggle('text-gray-500', !isTarget);
            });

            if (targetView === 'history') renderHistory();
            if (targetView === 'track') renderTodaysLogs();
            if (targetView === 'progress') {
                populateExerciseDropdown();
                updateChart();
            }
            if (targetView === 'routines') renderRoutines();
        }

        // --- TIMER & AUDIO ---
        function updateTimerDisplay() {
            DOMElements.timerDisplay.innerText = `${String(Math.floor(currentSecondsRemaining / 60)).padStart(2, '0')}:${String(currentSecondsRemaining % 60).padStart(2, '0')}`;
        }

        function startTimer() {
            clearInterval(timerInstance);
            requestWakeLock(); 
            timerInstance = setInterval(() => {
                currentSecondsRemaining--;
                if (currentSecondsRemaining <= 0) {
                    clearInterval(timerInstance);
                    timerInstance = null;
                    releaseWakeLock(); 
                    alertUser();
                    currentSecondsRemaining = defaultSeconds;
                }
                updateTimerDisplay();
            }, 1000);
        }

        function addTime(seconds) {
            currentSecondsRemaining += seconds;
            updateTimerDisplay();
            if (!timerInstance) startTimer();
        }

        function resetTimer() {
            clearInterval(timerInstance);
            timerInstance = null;
            releaseWakeLock(); 
            currentSecondsRemaining = defaultSeconds;
            updateTimerDisplay();
        }

        function alertUser() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator(), gainNode = audioCtx.createGain();
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(1.0, audioCtx.currentTime);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                setTimeout(() => oscillator.stop(), 800);
            } catch (e) { console.warn("Audio play blocked", e); }
        }

        function playMetronomeClick() {
            try {
                if (!metronomeAudioCtx) metronomeAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (metronomeAudioCtx.state === 'suspended') metronomeAudioCtx.resume();
                const oscillator = metronomeAudioCtx.createOscillator(), gainNode = metronomeAudioCtx.createGain();
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(1000, metronomeAudioCtx.currentTime);
                gainNode.gain.setValueAtTime(1.0, metronomeAudioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, metronomeAudioCtx.currentTime + 0.05);
                oscillator.connect(gainNode);
                gainNode.connect(metronomeAudioCtx.destination);
                oscillator.start();
                oscillator.stop(metronomeAudioCtx.currentTime + 0.05);
            } catch (e) { console.warn("Metronome click failed", e); }
        }

        function toggleMetronome() {
            const btn = DOMElements.metronomeBtn;
            if (metronomeInterval) {
                clearInterval(metronomeInterval);
                metronomeInterval = null;
                btn.classList.remove('text-yellow-500', 'border-yellow-500');
                btn.classList.add('text-gray-400', 'border-zinc-700');
            } else {
                playMetronomeClick();
                metronomeInterval = setInterval(playMetronomeClick, 1000);
                btn.classList.remove('text-gray-400', 'border-zinc-700');
                btn.classList.add('text-yellow-500', 'border-yellow-500');
            }
        }
        
        // --- 1RM CALCULATION ---
        function getEstimated1RM(exerciseName) {
            const filteredLogs = workoutLogs.filter(log => log.exercise.toLowerCase().trim() === exerciseName.toLowerCase().trim());
            if (filteredLogs.length === 0) return null;
            return Math.max(...filteredLogs.map(log => parseFloat(log.weight) * (1 + (parseInt(log.reps) / 30))));
        }

        // --- LOGGING & TRACKING UI ---
        function saveGenericSet() {
            const exercise = DOMElements.custom.exercise.value.trim();
            const weight = DOMElements.custom.weight.value;
            const reps = DOMElements.custom.reps.value;
            if (!exercise || !weight || !reps) return alert('Please fill in all fields!');
            
            const log = { id: Date.now(), date: getISODate(), exercise, weight, reps };
            addLog(log);

            DOMElements.custom.weight.value = '';
            DOMElements.custom.reps.value = '';
            if (DOMElements.autoTimerCheck.checked) {
                resetTimer();
                startTimer();
                if(metronomeInterval) toggleMetronome();
            }
        }

        function completeStep(index, exerciseName) {
            const weightInput = document.getElementById(`wt-${index}`);
            const repsInput = document.getElementById(`rp-${index}`);
            const weight = weightInput.value.trim();
            const reps = repsInput.value.trim();

            if (!weight || !reps) return alert('Please input actual weight and reps.');

            const log = { id: Date.now(), date: getISODate(), exercise: exerciseName, weight, reps };
            addLog(log);
            
            if (DOMElements.autoTimerCheck.checked) {
                resetTimer();
                startTimer();
                if(metronomeInterval) toggleMetronome();
            }

            const stepDiv = document.getElementById(`step-${index}`);
            const btn = document.getElementById(`btn-complete-${index}`);
            stepDiv.classList.add('opacity-30', 'pointer-events-none');
            btn.classList.replace('text-transparent', 'text-black');
            btn.classList.replace('border-zinc-600', 'border-yellow-500');
            btn.classList.replace('bg-zinc-950', 'bg-yellow-500');
        }

        function skipStep(index) {
            document.getElementById(`step-${index}`).classList.add('opacity-20', 'pointer-events-none', 'grayscale');
        }
        
        function addLog(log) {
            workoutLogs.unshift(log);
            saveData();
            addLogToView(log); 
            populateExerciseDropdown(); 
            updateChart(); 
        }

        function deleteLog(id) {
            if (!confirm("Delete this logged set?")) return;

            const logIndex = workoutLogs.findIndex(log => log.id === id);
            if (logIndex > -1) {
                workoutLogs.splice(logIndex, 1);
                saveData();
                
                const elementToRemove = document.querySelector(`[data-log-id="${id}"]`);
                if (elementToRemove) elementToRemove.remove();

                if (DOMElements.logList.children.length === 0) renderTodaysLogs();
                if (DOMElements.historyList.children.length === 0) renderHistory();

                populateExerciseDropdown();
                updateChart();
            }
        }

        function createLogItemDOM(log) {
            const item = document.createElement('div');
            item.className = "flex justify-between items-center bg-zinc-800 p-3 rounded-lg border border-zinc-700/60";
            item.setAttribute('data-log-id', log.id);

            const exerciseDiv = document.createElement('div');
            exerciseDiv.className = "font-semibold text-white";
            exerciseDiv.textContent = log.exercise;

            const controlsDiv = document.createElement('div');
            controlsDiv.className = "flex items-center gap-4";
            
            const statsSpan = document.createElement('span');
            statsSpan.className = "text-yellow-500 font-bold";
            statsSpan.textContent = `${log.weight} lbs × ${log.reps}`;
            
            const deleteButton = document.createElement('button');
            deleteButton.className = "text-red-400 hover:text-red-500 font-bold px-2 py-1 text-sm transition";
            deleteButton.title = "Delete set";
            deleteButton.innerHTML = '✕';
            deleteButton.onclick = () => deleteLog(log.id);

            controlsDiv.append(statsSpan, deleteButton);
            item.append(exerciseDiv, controlsDiv);
            return item;
        }

        function addLogToView(log) {
            const placeholder = DOMElements.logList.querySelector('p');
            if (placeholder) placeholder.remove();
            
            const logItem = createLogItemDOM(log);
            DOMElements.logList.prepend(logItem);
        }

        function renderTodaysLogs() {
            const list = DOMElements.logList;
            list.innerHTML = ''; 
            const today = getISODate();
            const todaysLogs = workoutLogs.filter(log => log.date === today);

            if (todaysLogs.length === 0) {
                list.innerHTML = '<p class="text-zinc-500 text-sm text-center py-2">No sets logged yet today.</p>';
            } else {
                todaysLogs.forEach(log => list.appendChild(createLogItemDOM(log)));
            }
        }

        function renderHistory() {
            const list = DOMElements.historyList;
            list.innerHTML = '';
            const today = getISODate();
            const pastLogs = workoutLogs.filter(log => log.date !== today);

            if (pastLogs.length === 0) {
                list.innerHTML = '<p class="text-zinc-500 text-sm text-center py-4">No past history found.</p>';
                return;
            }
            
            const groupedLogs = pastLogs.reduce((groups, log) => {
                if (!groups[log.date]) groups[log.date] = [];
                groups[log.date].push(log);
                return groups;
            }, {});

            const sortedDates = Object.keys(groupedLogs).sort((a, b) => new Date(b) - new Date(a));

            for (const date of sortedDates) {
                const logs = groupedLogs[date];
                const dateGroup = document.createElement('div');
                dateGroup.className = "mb-4 border-l-2 border-yellow-500 pl-3";
                
                const dateHeader = document.createElement('h3');
                dateHeader.className = "text-gray-400 font-bold text-sm mb-2";
                
                // Formats standardized YYYY-MM-DD properly without timezone shift offsets
                dateHeader.textContent = new Date(date + 'T00:00:00').toLocaleDateString(undefined, { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
                
                const setsContainer = document.createElement('div');
                setsContainer.className = "space-y-1";

                logs.forEach(log => {
                     const setItem = document.createElement('div');
                     setItem.className = "flex justify-between items-center bg-zinc-800 p-2.5 rounded-lg border border-zinc-700/50 text-sm mt-1.5";
                     setItem.setAttribute('data-log-id', log.id);
                     setItem.innerHTML = `
                        <span class="text-gray-300 font-medium">${log.exercise}</span>
                        <div class="flex items-center gap-3">
                            <span class="text-yellow-500 font-semibold">${log.weight} lbs × ${log.reps}</span>
                            <button onclick="this.dispatchEvent(new CustomEvent('deleteLog', { bubbles: true, detail: { id: ${log.id} } }))" class="text-red-400 hover:text-red-500 font-bold px-1.5 text-xs transition">✕</button>
                        </div>`;
                     setsContainer.appendChild(setItem);
                });

                dateGroup.append(dateHeader, setsContainer);
                list.appendChild(dateGroup);
            }
        }
        
        // --- ROUTINE PLANS UI ---
        function populateRoutineDropdown() {
            const select = DOMElements.activeRoutineSelect;
            select.innerHTML = '<option value="">-- Custom Workout --</option>';
            workoutRoutines.forEach(routine => {
                const opt = document.createElement('option');
                opt.value = routine.id;
                opt.textContent = routine.name;
                select.appendChild(opt);
            });
        }
        
        function renderRoutineChecklist() {
            const selectId = DOMElements.activeRoutineSelect.value;
            const container = DOMElements.routineChecklist;
            
            if (!selectId) {
                container.classList.add('hidden');
                container.innerHTML = '';
                return;
            }

            const routine = workoutRoutines.find(r => String(r.id) === selectId);
            if (!routine) return;

            container.classList.remove('hidden');
            container.innerHTML = ''; 

            // Warm-ups
            if (routine.warmups && routine.warmups.length > 0) {
                 const content = routine.warmups.map(item => `<div class="p-2 border-b border-zinc-700/50 last:border-0 text-gray-300 text-sm">${item}</div>`).join('');
                 container.insertAdjacentHTML('beforeend', createCollapsibleWidget('🔥 Warm-Up Guidelines', content));
            }
           
            // Group duplicate steps together safely
            const groupedExercises = routine.exercises.reduce((acc, ex, originalIndex) => {
                ex.originalIndex = originalIndex; 
                const group = acc.find(g => g.name === ex.name);
                if (group) {
                    group.sets.push(ex);
                } else {
                    acc.push({ name: ex.name, sets: [ex] });
                }
                return acc;
            }, []);

            // Render Exercises
            groupedExercises.forEach(group => {
                const estimated1RM = getEstimated1RM(group.name);
                let setsHtml = '';

                group.sets.forEach(ex => {
                    const index = ex.originalIndex;
                    let targetDisplay = `${ex.pct}%`;
                    let defaultWeight = "", defaultReps = ex.reps.toLowerCase() === 'amrap' ? '' : ex.reps;

                    if (estimated1RM) {
                        const computedWeight = Math.round((estimated1RM * (ex.pct / 100)) / 5) * 5;
                        targetDisplay = `${computedWeight} lbs`;
                        defaultWeight = computedWeight;
                    }
                    
                    setsHtml += `
                    <div id="step-${index}" class="flex items-center gap-3 py-3 border-b border-zinc-700/50 last:border-0 check-anim transition-all">
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between items-center mb-1.5">
                                <span class="text-[10px] font-bold text-zinc-400 uppercase tracking-widest bg-zinc-950 border border-zinc-800 px-1.5 py-0.5 rounded">${ex.type}</span>
                                <span class="text-[11px] font-bold text-yellow-500/90">Target: ${targetDisplay} × ${ex.reps}</span>
                            </div>
                            <div class="flex gap-2 items-center">
                                <input type="number" id="wt-${index}" value="${defaultWeight}" placeholder="lbs" class="w-full bg-zinc-950 border border-zinc-700 rounded p-1.5 text-white text-sm text-center focus:outline-none focus:border-yellow-500 transition">
                                <span class="text-zinc-600 text-sm font-bold">×</span>
                                <input type="number" id="rp-${index}" value="${defaultReps}" placeholder="reps" class="w-full bg-zinc-950 border border-zinc-700 rounded p-1.5 text-white text-sm text-center focus:outline-none focus:border-yellow-500 transition">
                            </div>
                        </div>
                        <div class="flex gap-1.5 items-stretch h-10 flex-shrink-0 self-end">
                            <button data-action="skip" data-index="${index}" class="w-10 text-zinc-500 hover:text-red-400 bg-zinc-950 rounded border border-zinc-800 transition flex items-center justify-center" title="Skip Set">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M13 5l7 7-7 7M5 5l7 7-7 7"></path></svg>
                            </button>
                            <button id="btn-complete-${index}" data-action="complete" data-index="${index}" data-exercise-name="${ex.name.replace(/"/g, '&quot;')}" class="w-12 bg-zinc-950 border border-zinc-600 rounded flex items-center justify-center text-transparent hover:border-yellow-500 hover:text-yellow-500/30 transition check-anim" title="Complete Set">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                            </button>
                        </div>
                    </div>`;
                });
                
                container.insertAdjacentHTML('beforeend', `
                <div class="bg-zinc-800 rounded-xl border border-zinc-700 overflow-hidden shadow-sm">
                    <div class="bg-zinc-700/30 px-4 py-2 border-b border-zinc-700"><h3 class="font-bold text-gray-200">${group.name}</h3></div>
                    <div class="px-3">${setsHtml}</div>
                </div>`);
            });
            
            // Cool-downs
            if (routine.cooldowns && routine.cooldowns.length > 0) {
                const content = routine.cooldowns.map(item => `<div class="p-2 border-b border-zinc-700/50 last:border-0 text-gray-300 text-sm">${item}</div>`).join('');
                container.insertAdjacentHTML('beforeend', createCollapsibleWidget('❄️ Cool-Down Guidelines', content));
            }
        }

        function createCollapsibleWidget(title, content) {
            return `
            <div class="bg-zinc-800 rounded-xl border border-zinc-700 overflow-hidden shadow-sm">
                <details open>
                    <summary class="bg-zinc-700/30 px-4 py-2 cursor-pointer list-none flex justify-between items-center">
                        <h3 class="font-bold text-gray-200 inline">${title}</h3>
                        <span class="text-xs text-zinc-400">Tap to toggle</span>
                    </summary>
                    <div class="p-3">${content}</div>
                </details>
            </div>`;
        }

        // --- ROUTINE BUILDER ---
        function addExerciseRow() {
            const template = document.getElementById('exerciseRowTemplate');
            const clone = template.content.cloneNode(true);
            DOMElements.exerciseRowsContainer.appendChild(clone);
        }

        function saveRoutine() {
            const name = DOMElements.routineName.value.trim();
            if (!name) return alert("Please provide a template name.");

            const exerciseRows = DOMElements.exerciseRowsContainer.children;
            if (exerciseRows.length === 0) return alert("Please add at least one exercise step.");
            
            const exercises = [];
            for (const row of exerciseRows) {
                const exName = row.querySelector('.ex-name').value.trim();
                const exType = row.querySelector('.ex-type').value;
                const exPct = row.querySelector('.ex-pct').value.trim();
                const exReps = row.querySelector('.ex-reps').value.trim();
                
                if (!exName || !exPct || !exReps) {
                    alert("Please fill out Name, %1RM, and Reps for all exercises.");
                    return; 
                }
                exercises.push({ name: exName, type: exType, pct: parseInt(exPct), reps: exReps });
            }

            const warmups = DOMElements.warmupInput.value.split('\n').filter(Boolean);
            const cooldowns = DOMElements.cooldownInput.value.split('\n').filter(Boolean);
            
            const routine = { id: Date.now(), name, warmups, exercises, cooldowns };
            workoutRoutines.push(routine);
            saveData();

            DOMElements.routineName.value = '';
            DOMElements.warmupInput.value = '';
            DOMElements.cooldownInput.value = '';
            DOMElements.exerciseRowsContainer.innerHTML = '';
            addExerciseRow(); 
            
            renderRoutines();
            populateRoutineDropdown();
            alert("Routine saved!");
        }

        function deleteRoutine(id) {
            if (!confirm("Delete this routine?")) return;
            workoutRoutines = workoutRoutines.filter(r => r.id !== id);
            saveData();
            renderRoutines();
            populateRoutineDropdown();
        }

        function renderRoutines() {
            const list = DOMElements.routineList;
            list.innerHTML = '';
            if (workoutRoutines.length === 0) {
                list.innerHTML = '<p class="text-zinc-500 text-sm">No saved routines.</p>';
                return;
            }
            workoutRoutines.forEach(routine => {
                const item = document.createElement('div');
                item.className = "bg-zinc-800 p-3 rounded-lg border border-zinc-700";
                
                const exList = routine.exercises.map(ex => 
                    `<span class="inline-block bg-zinc-700 text-gray-300 text-xs px-2 py-1 rounded mt-2 mr-1 border border-zinc-600">${ex.name} (${ex.type})</span>`
                ).join('');
                
                item.innerHTML = `
                <div class="flex justify-between items-start">
                    <div class="font-bold text-yellow-500">${routine.name}</div>
                    <button data-action="delete-routine" data-id="${routine.id}" class="text-red-400 hover:text-red-500 font-bold px-2 text-sm transition">✕</button>
                </div>
                <div class="mt-1">${exList}</div>`;
                list.appendChild(item);
            });
        }
        
        // --- PROGRESS CHART ---
        function populateExerciseDropdown() {
            const select = DOMElements.exerciseSelect;
            const currentSelection = select.value;
            
            const uniqueExercises = [...new Set(workoutLogs.map(log => log.exercise.toLowerCase().trim()))].sort();
            
            select.innerHTML = '<option value="">Select Exercise...</option>';
            uniqueExercises.forEach(ex => {
                const opt = document.createElement('option');
                opt.value = ex;
                opt.textContent = ex.charAt(0).toUpperCase() + ex.slice(1);
                select.appendChild(opt);
            });
            
            if (uniqueExercises.includes(currentSelection)) {
                select.value = currentSelection;
            }
        }

        function updateChart() {
            const selectedExercise = DOMElements.exerciseSelect.value;
            
            if (progressChart) progressChart.destroy();
            if (!selectedExercise) return;

            const filteredLogs = workoutLogs.filter(log => log.exercise.toLowerCase().trim() === selectedExercise);
            
            const maxWeightPerDate = {};
            const max1RmPerDate = {};

            filteredLogs.forEach(log => {
                const weight = parseFloat(log.weight);
                const reps = parseInt(log.reps);
                const estimated1RM = Math.round(weight * (1 + (reps / 30)));

                if (!maxWeightPerDate[log.date] || weight > maxWeightPerDate[log.date]) {
                    maxWeightPerDate[log.date] = weight;
                }
                if (!max1RmPerDate[log.date] || estimated1RM > max1RmPerDate[log.date]) {
                    max1RmPerDate[log.date] = estimated1RM;
                }
            });

            const sortedDates = Object.keys(maxWeightPerDate).sort((a, b) => new Date(a) - new Date(b));
            const weightData = sortedDates.map(date => maxWeightPerDate[date]);
            const oneRmData = sortedDates.map(date => max1RmPerDate[date]);

            Chart.defaults.color = '#9ca3af';
            progressChart = new Chart(DOMElements.progressChartCtx, {
                type: 'line',
                data: {
                    labels: sortedDates,
                    datasets: [
                        { label: 'Max Weight (lbs)', data: weightData, borderColor: '#eab308', backgroundColor: 'rgba(234, 179, 8, 0.15)', borderWidth: 3, pointBackgroundColor: '#eab308', pointBorderColor: '#000', fill: true, tension: 0.3 },
                        { label: 'Estimated 1RM (lbs)', data: oneRmData, borderColor: '#e5e7eb', backgroundColor: 'transparent', borderWidth: 2, borderDash: [5, 5], pointBackgroundColor: '#e5e7eb', pointBorderColor: '#000', fill: false, tension: 0.3 }
                    ]
                },
                options: {
                    responsive: true,
                    scales: { y: { beginAtZero: false, grid: { color: 'rgba(63, 63, 70, 0.5)' } }, x: { grid: { display: false } } },
                    plugins: { legend: { display: true, labels: { color: '#d1d5db', usePointStyle: true } } }
                }
            });
        }
        
        // --- EVENT LISTENERS & SETUP ---
        function setupEventListeners() {
            DOMElements.loadButton.addEventListener('click', () => DOMElements.restoreInput.click());
            DOMElements.restoreInput.addEventListener('change', restoreBackup);
            DOMElements.saveButton.addEventListener('click', backupData);
            DOMElements.navTabs.forEach(tab => tab.addEventListener('click', () => switchView(tab.dataset.view)));
            DOMElements.addTimeBtn.addEventListener('click', () => addTime(60));
            DOMElements.resetTimerBtn.addEventListener('click', resetTimer);
            DOMElements.metronomeBtn.addEventListener('click', toggleMetronome);
            DOMElements.activeRoutineSelect.addEventListener('change', renderRoutineChecklist);
            DOMElements.logCustomSetBtn.addEventListener('click', saveGenericSet);
            DOMElements.exerciseSelect.addEventListener('change', updateChart);
            DOMElements.addExerciseRowBtn.addEventListener('click', addExerciseRow);
            DOMElements.saveRoutineBtn.addEventListener('click', saveRoutine);

            // Delegated events (dynamic elements)
            DOMElements.routineChecklist.addEventListener('click', (e) => {
                const button = e.target.closest('button');
                if (!button) return;
                const { action, index, exerciseName } = button.dataset;
                if (action === 'complete') completeStep(index, exerciseName);
                if (action === 'skip') skipStep(index);
            });

            DOMElements.exerciseRowsContainer.addEventListener('click', (e) => {
                if (e.target.classList.contains('remove-row-btn')) {
                    e.target.parentElement.remove();
                }
            });

            DOMElements.routineList.addEventListener('click', (e) => {
                const button = e.target.closest('button[data-action="delete-routine"]');
                if (button) {
                    deleteRoutine(parseInt(button.dataset.id, 10));
                }
            });

            document.body.addEventListener('deleteLog', (e) => deleteLog(e.detail.id));
        }

        function fullRender() {
            const activeView = document.querySelector('.nav-tab.text-yellow-500').dataset.view || 'track';
            populateRoutineDropdown();
            renderRoutines();
            renderTodaysLogs();
            switchView(activeView);
        }

        function init() {
            loadData();
            setupEventListeners();
            switchView('track'); 
            populateRoutineDropdown();
            updateTimerDisplay();
            renderTodaysLogs();
            renderRoutines();
            addExerciseRow(); 
        }

        // Initialize application
        init();
    })();
    </script>
</body>
</html>
