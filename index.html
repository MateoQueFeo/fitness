<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Log your strength and mobility routines with FitTracker.">
  <title>FitTracker</title>
  <meta name="theme-color" content="#ffd700">
  <link rel="stylesheet" href="./style.css">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./apple-touch-icon.png">
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(err => {
          console.error('Service Worker registration failed:', err);
        });
      });
    }
  </script>
  <script src="./script.js" defer></script>
</head>
<body>
  <div id="appLoader" class="loader-container">
    <div class="loader"></div>
    <p id="loaderErrorText" class="hidden" style="color: #ffd700; text-align: center;"></p>
    <button id="retryLoadBtn" class="hidden" style="width: auto; padding: 10px 20px; margin-top: 20px;">Retry</button>
  </div>

  <div id="notification" class="notification hidden"></div>

  <div id="confirmModal" class="modal-container hidden">
    <div class="modal-content">
      <p id="confirmModalText"></p>
      <div class="button-group">
        <button id="confirmModalCancel" class="secondary">Cancel</button>
        <button id="confirmModalConfirm">Confirm</button>
      </div>
    </div>
  </div>

  <div id="appContainer" class="hidden">
    <div id="timerBar" class="hidden">
      <span id="timerDisplay">01:00</span>
      <div class="timer-controls">
        <button id="metronomeToggle">Metronome</button>
        <button id="addMinuteBtn" aria-label="Add one minute to timer">+1 Min</button>
        <button id="resetTimerBtn" aria-label="Reset timer">Reset</button>
      </div>
    </div>
    <header>
      <h1>FitTracker</h1>
    </header>
    
    <div class="container" id="mainMenu">
      <h3>Select a Routine</h3>
      <select id="workoutSelect">
        <option value="">Select a Routine...</option>
      </select>
      <button class="secondary" id="viewHistoryBtn">View Logs</button>
    </div>

    <div class="container hidden" id="workoutScreen">
      <button class="secondary" id="backToMenuBtn">← Back to Menu</button>
      <div class="card" id="workoutContent"></div>
    </div>

    <div class="container hidden" id="historyScreen">
      <div class="button-group">
        <button class="secondary" id="historyBackToMenuBtn">← Back to Menu</button>
        <button class="secondary" id="exportButton">Export All as CSV</button>
      </div>
      <h3>Workout Logs</h3>
      <div id="historyContent"></div>
    </div>
  </div>
</body>
</html>
