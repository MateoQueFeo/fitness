<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitTracker</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div id="timerBar" class="hidden">
    <span id="timerDisplay">01:00</span>
    <div class="timer-controls">
      <button id="metronomeToggle" onclick="toggleMetronome()">Metronome</button>
      <button onclick="addMinute()">+1 Min</button>
      <button onclick="resetTimer()">Reset</button>
    </div>
  </div>
  <header>FitTracker</header>
  
  <div class="container" id="mainMenu">
    <h3>Select a Routine</h3>
    <select id="workoutSelect" onchange="startSelectedWorkout()">
      <option value="">Select a Routine...</option>
    </select>
    <button class="secondary" onclick="viewHistory()">View Logs</button>
  </div>

  <div class="container hidden" id="workoutScreen">
    <button class="secondary" onclick="goHome()">← Back to Menu</button>
    <div class="card" id="workoutContent"></div>
  </div>

  <div class="container hidden" id="historyScreen">
    <div class="button-group">
      <button class="secondary" onclick="goHome()">← Back to Menu</button>
      <button class="secondary" id="importButton" onclick="triggerImport()">Import from CSV</button>
      <input type="file" id="csvFileInput" class="hidden" accept=".csv" onchange="importLogs(event)">
      <button class="secondary" id="exportButton" onclick="exportLogs()">Export All as CSV</button>
    </div>
    <h3>Workout Logs</h3>
    <div id="historyContent"></div>
  </div>

  <div id="editModal" class="modal-container hidden">
      <div class="modal-content">
          <span class="close-btn" onclick="closeModal()">&times;</span>
          <h2>Edit Log</h2>
          <div id="editModalBody"></div>
      </div>
  </div>

  <script src="script.js" defer></script>
</body>
</html>
