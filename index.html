<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Workout Tracker</title>
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WorkoutTracker">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-512.png">
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <header class="header-container">
        <h1>WorkoutTracker</h1>
    </header>
    <main>
        <div class="card timer-card" id="timerCard">
            <div class="timer-display" id="timerDisplay" aria-live="polite">01:00</div>
            <div class="timer-controls">
                <button class="timer-btn" id="metronomeToggleBtn" aria-label="Toggle metronome">🎵</button>
                <button class="timer-btn add-min-btn" id="addMinBtn">+1 Min</button>
                <button class="timer-btn stop-btn" id="resetTimerBtn">Reset</button>
            </div>
        </div>
        <div class="card">
            <h2 id="formTitle">Log a Set</h2>
            <div class="form-group">
                <label for="exercise">Exercise</label>
                <input type="text" id="exercise" list="exerciseOptions" placeholder="Start typing..." required>
                <datalist id="exerciseOptions"></datalist>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="weight">Weight</label>
                    <input type="number" id="weight" placeholder="Weight" required>
                </div>
                <div class="form-group">
                    <label for="reps">Reps</label>
                    <input type="number" id="reps" placeholder="Reps" required>
                </div>
            </div>
            <div class="btn-group">
                <button id="submitBtn">Log Set</button>
                <button id="cancelEditBtn" class="cancel-btn">Cancel</button>
            </div>
        </div>
        <div class="card">
            <h2>🏆 Personal Bests (PRs)</h2>
            <div id="prContainer"></div>
        </div>
        <div class="card" id="chartCard">
            <h2>📈 Progress Chart (1RM)</h2>
            <div class="form-group">
                <label for="chartExerciseSelect">Select Exercise to Chart</label>
                <select id="chartExerciseSelect">
                    <option value="">-- Select an Exercise --</option>
                </select>
            </div>
            <div id="chartContainer" style="display: none;">
                <canvas id="progressChart"></canvas>
            </div>
        </div>
        <div class="card">
            <h2>History</h2>
            <div id="historyContainer"></div>
            <input type="file" id="csvFileInput" accept=".csv" style="display: none;">
            <div class="footer-actions">
                <button id="importBtn">📂 Import</button>
                <button id="exportBtn">💾 Export</button>
                <button class="danger-btn" id="clearDataBtn">🗑️ Clear</button>
            </div>
        </div>
    </main>
    <div id="toast" role="alert" aria-live="assertive"></div>
    <div id="confirmationModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <p id="modalMessage"></p>
            <div class="modal-actions">
                <button id="modalConfirmBtn" class="danger-btn">Confirm</button>
                <button id="modalCancelBtn">Cancel</button>
            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js" integrity="sha512-L0Shl7nXXzGUDTscLMgo7TGnq2k7GdXLTru2ro5qSziQC_LUUeyV6hWleXvo/6tENF19z+dVGKBASWroik4pMA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="./app.js"></script>
</body>
</html>
