<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Workout Tracker</title>
    
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WorkoutTracker">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-512.png">

    <link rel="stylesheet" href="./styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
    
    <header class="header-container">
        <h1>WorkoutTracker</h1>
    </header>
    
    <main>
        <div class="card timer-card">
            <div class="timer-display" id="timerDisplay" aria-live="polite">01:00</div>
            <div class="timer-controls">
                <button class="timer-btn add-min-btn" onclick="addMinute()">+1 Min</button>
                <button class="timer-btn stop-btn" onclick="stopTimer()">Reset</button>
            </div>
        </div>

        <div class="card">
            <h2 id="formTitle">Log a Set</h2>
            
            <div class="form-group">
                <label for="exercise">Exercise</label>
                <input type="text" id="exercise" list="exerciseOptions" placeholder="Start typing..." autocomplete="off" required>
                <datalist id="exerciseOptions"></datalist>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="weight">Weight</label>
                    <input type="number" id="weight" placeholder="Weight" required>
                </div>
                <div class="form-group">
                    <label for="reps">Reps</label>
                    <input type="number" id="reps" placeholder="Reps" required>
                </div>
            </div>
            
            <div class="btn-group">
                <button id="submitBtn" onclick="processSet()">Log Set</button>
                <button id="cancelEditBtn" class="cancel-btn" onclick="cancelEdit()">Cancel</button>
            </div>
        </div>

        <div class="card">
            <h2>🏆 Personal Bests (PRs)</h2>
            <div id="prContainer"></div>
        </div>

        <div class="card">
            <h2>📈 Progress Chart (1RM)</h2>
            <div class="form-group">
                <label for="chartExerciseSelect">Select Exercise to Chart</label>
                <select id="chartExerciseSelect" onchange="updateChart()">
                    <option value="">-- Select an Exercise --</option>
                </select>
            </div>
            <canvas id="progressChart"></canvas>
        </div>

        <div class="card">
            <h2>History</h2>
            <div id="historyContainer"></div>
            
            <input type="file" id="csvFileInput" accept=".csv" style="display: none;" onchange="importFromCSV(event)">
            
            <div class="footer-actions">
                <button onclick="document.getElementById('csvFileInput').click()">📂 Import</button>
                <button onclick="exportToCSV()">💾 Export</button>
                <button class="danger-btn" onclick="clearAllData()">🗑️ Clear</button>
            </div>
        </div>
    </main>

    <div id="toast" role="alert" aria-live="assertive"></div>

    <script src="./app.js"></script>
</body>
</html>
